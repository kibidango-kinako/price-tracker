<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BOX・パック 相場ダッシュボード</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.js"></script>
<style>
  :root {
    --bg:#0f0f0f; --bg2:#1a1a1a; --bg3:#242424;
    --border:rgba(255,255,255,0.08); --border2:rgba(255,255,255,0.14);
    --text:#f0f0f0; --text2:#888; --text3:#444;
    --accent:#e8a020; --accent2:#c47f10;
    --green:#4caf7d; --red:#e05555; --blue:#5b9cf6;
    --radius:10px; --radius-lg:14px;
  }
  *{box-sizing:border-box;margin:0;padding:0;}
  body{background:var(--bg);color:var(--text);font-family:'Helvetica Neue','Hiragino Sans',sans-serif;min-height:100vh;}

  .header{background:var(--bg2);border-bottom:1px solid var(--border);padding:12px 20px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:200;gap:12px;}
  .header-left{display:flex;align-items:center;gap:10px;flex-shrink:0;}
  .header-left h1{font-size:16px;font-weight:600;}
  .badge-live{background:var(--accent);color:#000;font-size:10px;font-weight:700;padding:2px 7px;border-radius:4px;letter-spacing:.06em;}
  .nav-link{color:var(--text2);font-size:12px;text-decoration:none;border:1px solid var(--border2);padding:4px 10px;border-radius:6px;white-space:nowrap;}
  .nav-link:hover{color:var(--accent);border-color:var(--accent2);}
  .status-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0;background:var(--text3);}
  .status-dot.loading{background:var(--accent);animation:pulse 1s infinite;}
  .status-dot.ok{background:var(--green);}
  .status-dot.error{background:var(--red);}
  @keyframes pulse{0%,100%{opacity:1}50%{opacity:.3}}
  .header-right{display:flex;align-items:center;gap:8px;}
  #statusText{font-size:12px;color:var(--text2);white-space:nowrap;}
  .reload-btn{background:var(--bg3);border:1px solid var(--border2);color:var(--text);padding:5px 10px;border-radius:var(--radius);font-size:12px;cursor:pointer;white-space:nowrap;}
  .reload-btn:hover{background:var(--border2);}

  .container{max-width:1200px;margin:0 auto;padding:16px;}
  .panel{background:var(--bg2);border:1px solid var(--border);border-radius:var(--radius-lg);padding:16px;margin-bottom:16px;}
  .section-title{font-size:11px;color:var(--text2);font-weight:500;text-transform:uppercase;letter-spacing:.08em;margin-bottom:12px;}

  .chart-card-name{font-size:15px;font-weight:700;color:var(--text);margin-bottom:8px;min-height:20px;}
  .search-select-row{display:flex;gap:8px;margin-bottom:8px;align-items:center;}
  .search-icon-wrap{position:relative;flex:1;}
  .search-icon-wrap::before{content:'🔍';position:absolute;left:9px;top:50%;transform:translateY(-50%);font-size:12px;pointer-events:none;}
  .chart-search-input,select{background:var(--bg3);border:1px solid var(--border2);color:var(--text);padding:7px 10px 7px 32px;border-radius:var(--radius);font-size:12px;outline:none;transition:border-color .15s;width:100%;}
  select{padding-left:10px;}
  .chart-search-input:focus,select:focus{border-color:var(--accent2);}

  .stats-row{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:8px;}
  .stat-box{background:var(--bg3);border-radius:8px;padding:7px 10px;min-width:90px;flex:1;}
  .stat-box-label{font-size:10px;color:var(--text3);margin-bottom:2px;white-space:nowrap;}
  .stat-box-val{font-size:13px;font-weight:700;white-space:nowrap;}
  .stat-box-sub{font-size:10px;color:var(--text2);margin-top:2px;white-space:nowrap;}

  .chart-wrap{position:relative;width:100%;height:260px;}
  .chart-legend{display:flex;gap:14px;margin-top:8px;flex-wrap:wrap;}
  .legend-item{display:flex;align-items:center;gap:5px;font-size:11px;color:var(--text2);}
  .legend-swatch{width:10px;height:10px;border-radius:2px;}

  .filter-bar{display:flex;gap:8px;margin-bottom:10px;align-items:center;flex-wrap:wrap;}
  .search-wrap{position:relative;flex:1;min-width:160px;}
  .search-wrap::before{content:'🔍';position:absolute;left:9px;top:50%;transform:translateY(-50%);font-size:12px;pointer-events:none;}
  .chip{padding:4px 10px;border-radius:20px;font-size:11px;font-weight:600;cursor:pointer;border:1px solid var(--border2);background:var(--bg3);color:var(--text2);transition:all .15s;white-space:nowrap;}
  .chip:hover{border-color:var(--accent2);color:var(--text);}
  .chip.active{background:var(--accent);border-color:var(--accent);color:#000;}
  .result-count{font-size:12px;color:var(--text3);white-space:nowrap;}

  .type-badge{display:inline-block;font-size:10px;font-weight:700;padding:1px 6px;border-radius:4px;letter-spacing:.03em;white-space:nowrap;}
  .t-BOX{background:rgba(232,160,32,.15);color:var(--accent);border:1px solid rgba(232,160,32,.3);}
  .t-パック{background:rgba(91,156,246,.15);color:var(--blue);border:1px solid rgba(91,156,246,.3);}

  .tbl-outer{overflow-x:auto;-webkit-overflow-scrolling:touch;max-height:62vh;border-radius:var(--radius);}
  table{width:100%;border-collapse:collapse;font-size:12px;min-width:860px;}
  thead{position:sticky;top:0;z-index:10;}
  th{padding:8px 10px;border-bottom:2px solid var(--border2);font-size:10px;color:var(--text2);font-weight:500;text-transform:uppercase;letter-spacing:.04em;white-space:nowrap;text-align:right;user-select:none;background:var(--bg2);cursor:pointer;}
  th:first-child{text-align:left;}
  th:hover{color:var(--text);}
  th.sort-active{color:var(--accent);}
  td{padding:7px 10px;border-bottom:1px solid var(--border);vertical-align:middle;text-align:right;}
  td:first-child{text-align:left;}
  tbody tr{cursor:pointer;transition:background .1s;}
  tbody tr:hover td{background:rgba(255,255,255,.03);}
  tbody tr.active td{background:rgba(232,160,32,.08);}
  .card-link{color:var(--text);text-decoration:none;font-size:12px;font-weight:500;line-height:1.4;}
  .card-link:hover{color:var(--accent);}
  .price-avg{font-weight:600;}
  .chg{font-size:11px;font-weight:700;white-space:nowrap;}
  .chg.up{color:var(--green);}
  .chg.down{color:var(--red);}
  .chg.flat{color:var(--text3);}
  .empty-state{text-align:center;padding:40px;color:var(--text3);font-size:13px;}

  .loading-state{text-align:center;padding:60px 20px;color:var(--text2);}
  .spinner{width:28px;height:28px;border:3px solid var(--border2);border-top-color:var(--accent);border-radius:50%;margin:0 auto 14px;animation:spin .8s linear infinite;}
  @keyframes spin{to{transform:rotate(360deg)}}
</style>
</head>
<body>

<div class="header">
  <div class="header-left">
    <h1>BOX・パック 相場</h1>
    <span class="badge-live">LIVE</span>
    <a class="nav-link" href="./index.html">PSA10 →</a>
  </div>
  <div class="header-right">
    <div class="status-dot loading" id="dot"></div>
    <span id="statusText">読み込み中...</span>
    <button class="reload-btn" onclick="loadData(true)">更新</button>
  </div>
</div>

<div class="container">
  <div id="loadingView" class="loading-state">
    <div class="spinner"></div>
    <p>データを取得しています...</p>
  </div>

  <div id="mainView" style="display:none">

    <!-- 価格推移チャート -->
    <div class="panel">
      <div class="section-title">価格推移（1個あたり単価・シュリンクあり）</div>
      <div class="chart-card-name" id="chartName">—</div>
      <div class="search-select-row">
        <div class="search-icon-wrap" style="flex:1">
          <input class="chart-search-input" type="text" id="chartSearchInput" placeholder="商品を検索してチャートを切替...">
        </div>
      </div>
      <select id="productSelect" onchange="onSelectChange()" style="margin-bottom:10px"></select>
      <div style="display:flex;gap:5px;margin-bottom:10px;flex-wrap:wrap" id="rangeChips">
        <button class="chip range-chip active" data-d="7">7日</button>
        <button class="chip range-chip" data-d="14">14日</button>
        <button class="chip range-chip" data-d="30">30日</button>
        <button class="chip range-chip" data-d="all">全期間</button>
      </div>
      <div class="stats-row" id="statsRow"></div>
      <div class="chart-wrap"><canvas id="priceChart"></canvas></div>
      <div class="chart-legend">
        <div class="legend-item"><span class="legend-swatch" style="background:var(--accent)"></span>平均単価（取引）</div>
        <div class="legend-item"><span class="legend-swatch" style="background:var(--blue)"></span>出品最安値</div>
      </div>
    </div>

    <!-- 相場一覧 -->
    <div class="panel">
      <div class="section-title">本日の相場一覧</div>
      <div class="filter-bar">
        <button class="chip type-chip active" data-t="all">すべて</button>
        <button class="chip type-chip" data-t="BOX">BOX</button>
        <button class="chip type-chip" data-t="パック">パック</button>
        <div class="search-wrap">
          <input class="chart-search-input" type="text" id="tableSearch" placeholder="商品名で絞り込み...">
        </div>
        <span class="result-count" id="resultCount"></span>
      </div>
      <div class="tbl-outer">
        <table>
          <thead>
            <tr>
              <th data-k="product_name">商品名</th>
              <th data-k="product_type">種別</th>
              <th data-k="count" class="sort-active" id="defaultSort">取引数</th>
              <th data-k="units">販売個数</th>
              <th data-k="avg_price">平均単価</th>
              <th data-k="chg">前日比</th>
              <th data-k="min_price">最小</th>
              <th data-k="max_price">最大</th>
              <th data-k="lowest_price">出品最安</th>
            </tr>
          </thead>
          <tbody id="tblBody"></tbody>
        </table>
      </div>
      <div class="empty-state" id="emptyState" style="display:none">該当する商品がありません</div>
    </div>
  </div>
</div>

<script>
const DB_URL = './box_data.json';
let DATA = null;
let dailyByProduct = {};   // apparel_id -> [{date, avg, count}]
let askByProduct = {};     // apparel_id -> {date: lowest_price}
let prevAvgByProduct = {}; // apparel_id -> 前日平均
let productList = [];      // チャート/テーブル共通の商品メタ
let selectedId = null;
let rangeDays = 7;
let typeFilter = 'all';
let sortKey = 'count', sortDir = -1;
let chart = null;

const yen = n => (n == null) ? '—' : '¥' + Math.round(n).toLocaleString();

function setStatus(cls, text) {
  document.getElementById('dot').className = 'status-dot ' + cls;
  document.getElementById('statusText').textContent = text;
}

async function loadData(bust) {
  setStatus('loading', '読み込み中...');
  try {
    const res = await fetch(DB_URL + (bust ? '?t=' + Date.now() : ''));
    if (!res.ok) throw new Error('HTTP ' + res.status);
    DATA = await res.json();
    buildIndexes();
    render();
    setStatus('ok', '更新: ' + DATA.generated_at + '（取引 ' + DATA.total_records.toLocaleString() + '件）');
  } catch (e) {
    setStatus('error', '読み込み失敗: ' + e.message);
  }
  document.getElementById('loadingView').style.display = 'none';
  document.getElementById('mainView').style.display = '';
}

function buildIndexes() {
  dailyByProduct = {}; askByProduct = {}; prevAvgByProduct = {};
  const meta = {};

  // 取引 → 日別平均単価
  const acc = {};
  for (const tx of DATA.transactions) {
    const d = (tx.transaction_date || tx.collected_date).slice(0, 10);
    const k = tx.apparel_id;
    (acc[k] = acc[k] || {});
    (acc[k][d] = acc[k][d] || []).push(tx.unit_price);
    if (!meta[k]) meta[k] = {apparel_id: k, product_name: tx.product_name, product_type: tx.product_type, url: tx.url};
  }
  for (const k in acc) {
    dailyByProduct[k] = Object.entries(acc[k])
      .map(([date, arr]) => ({date, avg: arr.reduce((a, b) => a + b, 0) / arr.length, count: arr.length}))
      .sort((a, b) => a.date.localeCompare(b.date));
  }

  // 出品最安値スナップショット
  for (const p of (DATA.lowest_prices || [])) {
    const k = p.apparel_id;
    (askByProduct[k] = askByProduct[k] || {})[p.collected_date] = p.lowest_price;
    if (!meta[k]) meta[k] = {apparel_id: k, product_name: p.product_name, product_type: p.product_type, url: p.url};
  }

  // 前日平均（今日より前の直近日）
  for (const k in dailyByProduct) {
    const days = dailyByProduct[k].filter(d => d.date < DATA.today);
    if (days.length) prevAvgByProduct[k] = days[days.length - 1].avg;
  }

  productList = Object.values(meta).sort((a, b) => {
    const ca = (dailyByProduct[a.apparel_id] || []).reduce((s, d) => s + d.count, 0);
    const cb = (dailyByProduct[b.apparel_id] || []).reduce((s, d) => s + d.count, 0);
    return cb - ca;
  });
  if (!selectedId || !meta[selectedId]) selectedId = productList.length ? productList[0].apparel_id : null;
}

function render() { renderSelect(); renderChart(); renderTable(); }

function renderSelect(filterText) {
  const sel = document.getElementById('productSelect');
  const ft = (filterText || '').toLowerCase();
  sel.innerHTML = '';
  for (const p of productList) {
    if (ft && !p.product_name.toLowerCase().includes(ft)) continue;
    const o = document.createElement('option');
    o.value = p.apparel_id;
    o.textContent = '[' + p.product_type + '] ' + p.product_name;
    if (p.apparel_id === selectedId) o.selected = true;
    sel.appendChild(o);
  }
}

function onSelectChange() {
  selectedId = document.getElementById('productSelect').value;
  renderChart(); highlightRow();
}

function renderChart() {
  const p = productList.find(x => x.apparel_id === selectedId);
  document.getElementById('chartName').textContent = p ? p.product_name : '—';
  if (!p) return;

  let days = dailyByProduct[selectedId] || [];
  const asks = askByProduct[selectedId] || {};
  const askDates = Object.keys(asks).sort();
  let labels = [...new Set([...days.map(d => d.date), ...askDates])].sort();
  if (rangeDays !== 'all') labels = labels.slice(-rangeDays);
  const avgMap = Object.fromEntries(days.map(d => [d.date, Math.round(d.avg)]));
  const cntMap = Object.fromEntries(days.map(d => [d.date, d.count]));

  // 統計
  const today = DATA.today;
  const tAvg = avgMap[today], tCnt = cntMap[today] || 0;
  const prev = prevAvgByProduct[selectedId];
  let chgHtml = '<span class="chg flat">—</span>';
  if (tAvg != null && prev != null) {
    const pct = (tAvg - prev) / prev * 100;
    const cls = pct > 0.5 ? 'up' : pct < -0.5 ? 'down' : 'flat';
    const sign = pct > 0 ? '+' : '';
    chgHtml = '<span class="chg ' + cls + '">' + sign + pct.toFixed(1) + '%</span>';
  }
  document.getElementById('statsRow').innerHTML =
    '<div class="stat-box"><div class="stat-box-label">本日平均単価</div><div class="stat-box-val">' + yen(tAvg) + '</div></div>' +
    '<div class="stat-box"><div class="stat-box-label">前日比</div><div class="stat-box-val">' + chgHtml + '</div></div>' +
    '<div class="stat-box"><div class="stat-box-label">本日取引数</div><div class="stat-box-val">' + tCnt + '件</div></div>' +
    '<div class="stat-box"><div class="stat-box-label">出品最安値</div><div class="stat-box-val">' + yen(asks[today]) + '</div>' +
      '<div class="stat-box-sub"><a class="card-link" style="font-size:10px;color:var(--blue)" href="' + p.url + '" target="_blank" rel="noopener">スニダンで見る ↗</a></div></div>';

  const ds = [
    {label: '平均単価', data: labels.map(d => avgMap[d] ?? null), borderColor: '#e8a020',
     backgroundColor: 'rgba(232,160,32,.1)', spanGaps: true, tension: .25, pointRadius: 3, fill: true},
    {label: '出品最安値', data: labels.map(d => asks[d] ?? null), borderColor: '#5b9cf6',
     backgroundColor: 'transparent', spanGaps: true, tension: .25, pointRadius: 2, borderDash: [5, 4]},
  ];
  if (chart) chart.destroy();
  chart = new Chart(document.getElementById('priceChart'), {
    type: 'line',
    data: {labels, datasets: ds},
    options: {
      responsive: true, maintainAspectRatio: false,
      interaction: {mode: 'index', intersect: false},
      plugins: {
        legend: {display: false},
        tooltip: {callbacks: {label: c => c.dataset.label + ': ' + yen(c.parsed.y) +
          (c.datasetIndex === 0 && cntMap[c.label] ? '（' + cntMap[c.label] + '件）' : '')}},
      },
      scales: {
        x: {ticks: {color: '#888', font: {size: 10}}, grid: {color: 'rgba(255,255,255,.05)'}},
        y: {ticks: {color: '#888', font: {size: 10}, callback: v => '¥' + v.toLocaleString()},
            grid: {color: 'rgba(255,255,255,.05)'}},
      },
    },
  });
}

function tableRows() {
  const q = document.getElementById('tableSearch').value.toLowerCase();
  let rows = (DATA.today_products || []).map(p => {
    const prev = prevAvgByProduct[p.apparel_id];
    const chg = (prev != null) ? (p.avg_price - prev) / prev * 100 : null;
    return {...p, chg};
  });
  if (typeFilter !== 'all') rows = rows.filter(r => r.product_type === typeFilter);
  if (q) rows = rows.filter(r => r.product_name.toLowerCase().includes(q));
  rows.sort((a, b) => {
    let va = a[sortKey], vb = b[sortKey];
    if (va == null) return 1;
    if (vb == null) return -1;
    if (typeof va === 'string') return va.localeCompare(vb) * sortDir;
    return (va - vb) * sortDir;
  });
  return rows;
}

function renderTable() {
  const rows = tableRows();
  const tb = document.getElementById('tblBody');
  document.getElementById('resultCount').textContent = rows.length + '商品';
  document.getElementById('emptyState').style.display = rows.length ? 'none' : '';
  tb.innerHTML = rows.map(r => {
    let chgHtml = '<span class="chg flat">—</span>';
    if (r.chg != null) {
      const cls = r.chg > 0.5 ? 'up' : r.chg < -0.5 ? 'down' : 'flat';
      chgHtml = '<span class="chg ' + cls + '">' + (r.chg > 0 ? '+' : '') + r.chg.toFixed(1) + '%</span>';
    }
    return '<tr data-id="' + r.apparel_id + '" class="' + (r.apparel_id === selectedId ? 'active' : '') + '">' +
      '<td><a class="card-link" href="' + r.url + '" target="_blank" rel="noopener" onclick="event.stopPropagation()">' + r.product_name + '</a></td>' +
      '<td><span class="type-badge t-' + r.product_type + '">' + r.product_type + '</span></td>' +
      '<td>' + r.count + '件</td>' +
      '<td>' + (r.units || '—') + '</td>' +
      '<td class="price-avg">' + yen(r.avg_price) + '</td>' +
      '<td>' + chgHtml + '</td>' +
      '<td>' + yen(r.min_price) + '</td>' +
      '<td>' + yen(r.max_price) + '</td>' +
      '<td>' + yen(r.lowest_price) + '</td>' +
      '</tr>';
  }).join('');
  tb.querySelectorAll('tr').forEach(tr => tr.addEventListener('click', () => {
    selectedId = tr.dataset.id;
    renderSelect(); renderChart(); highlightRow();
    window.scrollTo({top: 0, behavior: 'smooth'});
  }));
}

function highlightRow() {
  document.querySelectorAll('#tblBody tr').forEach(tr =>
    tr.classList.toggle('active', tr.dataset.id === selectedId));
}

// イベント
document.getElementById('chartSearchInput').addEventListener('input', e => {
  renderSelect(e.target.value);
  const sel = document.getElementById('productSelect');
  if (e.target.value && sel.options.length) {
    selectedId = sel.options[0].value;
    sel.selectedIndex = 0;
    renderChart(); highlightRow();
  }
});
document.getElementById('tableSearch').addEventListener('input', renderTable);
document.querySelectorAll('.range-chip').forEach(b => b.addEventListener('click', () => {
  document.querySelectorAll('.range-chip').forEach(x => x.classList.remove('active'));
  b.classList.add('active');
  rangeDays = b.dataset.d === 'all' ? 'all' : parseInt(b.dataset.d);
  renderChart();
}));
document.querySelectorAll('.type-chip').forEach(b => b.addEventListener('click', () => {
  document.querySelectorAll('.type-chip').forEach(x => x.classList.remove('active'));
  b.classList.add('active');
  typeFilter = b.dataset.t;
  renderTable();
}));
document.querySelectorAll('th[data-k]').forEach(th => th.addEventListener('click', () => {
  const k = th.dataset.k;
  if (sortKey === k) sortDir *= -1; else { sortKey = k; sortDir = -1; }
  document.querySelectorAll('th').forEach(x => x.classList.remove('sort-active'));
  th.classList.add('sort-active');
  renderTable();
}));

loadData(false);
</script>
</body>
</html>
