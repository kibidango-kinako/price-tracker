<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PSA10 相場ダッシュボード</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@3.19.0/dist/tabler-icons.min.css">
<style>
  :root {
    --bg: #0f0f0f;
    --bg2: #1a1a1a;
    --bg3: #242424;
    --border: rgba(255,255,255,0.08);
    --border2: rgba(255,255,255,0.14);
    --text: #f0f0f0;
    --text2: #888;
    --text3: #555;
    --accent: #e8a020;
    --accent2: #c47f10;
    --green: #4caf7d;
    --red: #e05555;
    --blue: #5b9cf6;
    --radius: 10px;
    --radius-lg: 14px;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: var(--bg); color: var(--text); font-family: 'Helvetica Neue', 'Hiragino Sans', sans-serif; min-height: 100vh; }

  /* Header */
  .header { background: var(--bg2); border-bottom: 1px solid var(--border); padding: 14px 20px; display: flex; align-items: center; justify-content: space-between; position: sticky; top: 0; z-index: 100; }
  .header-left { display: flex; align-items: center; gap: 10px; }
  .header-left h1 { font-size: 16px; font-weight: 600; letter-spacing: .02em; }
  .header-left .badge { background: var(--accent); color: #000; font-size: 10px; font-weight: 700; padding: 2px 7px; border-radius: 4px; letter-spacing: .06em; }
  .status-dot { width: 8px; height: 8px; border-radius: 50%; background: var(--text3); flex-shrink: 0; }
  .status-dot.loading { background: var(--accent); animation: pulse 1s infinite; }
  .status-dot.ok { background: var(--green); }
  .status-dot.error { background: var(--red); }
  @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:.3} }
  .header-right { display: flex; align-items: center; gap: 8px; }
  #statusText { font-size: 12px; color: var(--text2); }
  .reload-btn { background: var(--bg3); border: 1px solid var(--border2); color: var(--text); padding: 6px 12px; border-radius: var(--radius); font-size: 12px; cursor: pointer; display: flex; align-items: center; gap: 5px; transition: background .15s; }
  .reload-btn:hover { background: var(--border); }

  /* Layout */
  .container { max-width: 960px; margin: 0 auto; padding: 20px 16px; }

  /* Metrics */
  .metrics { display: grid; grid-template-columns: repeat(auto-fit, minmax(130px, 1fr)); gap: 10px; margin-bottom: 20px; }
  .metric { background: var(--bg2); border: 1px solid var(--border); border-radius: var(--radius); padding: 14px 16px; }
  .metric .m-label { font-size: 11px; color: var(--text2); margin-bottom: 6px; }
  .metric .m-val { font-size: 24px; font-weight: 600; color: var(--text); line-height: 1; }
  .metric .m-sub { font-size: 11px; color: var(--text3); margin-top: 4px; }
  .metric.accent { border-color: var(--accent2); }
  .metric.accent .m-val { color: var(--accent); }

  /* Tabs */
  .tabs { display: flex; gap: 2px; margin-bottom: 16px; background: var(--bg2); border: 1px solid var(--border); border-radius: var(--radius); padding: 4px; }
  .tab { flex: 1; padding: 8px 10px; background: none; border: none; color: var(--text2); font-size: 13px; cursor: pointer; border-radius: 7px; transition: all .15s; display: flex; align-items: center; justify-content: center; gap: 5px; }
  .tab.active { background: var(--bg3); color: var(--text); font-weight: 500; }
  .tab:hover:not(.active) { color: var(--text); }
  .tab-panel { display: none; }
  .tab-panel.active { display: block; }

  /* Card */
  .card { background: var(--bg2); border: 1px solid var(--border); border-radius: var(--radius-lg); padding: 16px; margin-bottom: 14px; }
  .card-title { font-size: 12px; color: var(--text2); margin-bottom: 12px; display: flex; align-items: center; gap: 6px; }

  /* Select */
  select { background: var(--bg3); border: 1px solid var(--border2); color: var(--text); padding: 8px 12px; border-radius: var(--radius); font-size: 13px; width: 100%; margin-bottom: 12px; cursor: pointer; }
  select:focus { outline: none; border-color: var(--accent2); }

  /* Chart */
  .chart-wrap { position: relative; width: 100%; height: 240px; }

  /* Table */
  .tbl-wrap { overflow-x: auto; -webkit-overflow-scrolling: touch; }
  table { width: 100%; border-collapse: collapse; font-size: 13px; min-width: 480px; }
  th { text-align: left; padding: 8px 10px; border-bottom: 1px solid var(--border); font-size: 11px; color: var(--text2); font-weight: 500; text-transform: uppercase; letter-spacing: .05em; white-space: nowrap; }
  td { padding: 10px 10px; border-bottom: 1px solid var(--border); color: var(--text); vertical-align: middle; }
  tr:last-child td { border-bottom: none; }
  tr:hover td { background: rgba(255,255,255,.02); }
  .card-name { font-size: 12px; line-height: 1.5; }
  .rarity { display: inline-block; font-size: 10px; font-weight: 700; padding: 2px 6px; border-radius: 4px; letter-spacing: .04em; }
  .r-SAR { background: rgba(232,160,32,.15); color: var(--accent); border: 1px solid rgba(232,160,32,.3); }
  .r-SR { background: rgba(91,156,246,.15); color: var(--blue); border: 1px solid rgba(91,156,246,.3); }
  .r-MA { background: rgba(76,175,125,.15); color: var(--green); border: 1px solid rgba(76,175,125,.3); }
  .r-other { background: var(--bg3); color: var(--text2); border: 1px solid var(--border); }
  .price-high { color: var(--red); font-weight: 500; }
  .price-low { color: var(--green); font-weight: 500; }
  .price-avg { color: var(--text); font-weight: 600; }

  /* Profit calc */
  .form-row { display: flex; align-items: center; gap: 10px; margin-bottom: 12px; flex-wrap: wrap; }
  .form-row label { font-size: 12px; color: var(--text2); min-width: 72px; }
  .form-row input { background: var(--bg3); border: 1px solid var(--border2); color: var(--text); padding: 8px 12px; border-radius: var(--radius); font-size: 13px; width: 140px; }
  .form-row input:focus { outline: none; border-color: var(--accent2); }
  .form-row .unit { font-size: 12px; color: var(--text2); }
  .profit-results { display: grid; grid-template-columns: repeat(auto-fit, minmax(140px, 1fr)); gap: 10px; margin-top: 14px; padding-top: 14px; border-top: 1px solid var(--border); }
  .pr-item { background: var(--bg3); border-radius: var(--radius); padding: 12px; }
  .pr-label { font-size: 11px; color: var(--text2); margin-bottom: 6px; }
  .pr-val { font-size: 20px; font-weight: 600; }
  .pr-val.pos { color: var(--green); }
  .pr-val.neg { color: var(--red); }
  .pr-sub { font-size: 11px; color: var(--text3); margin-top: 3px; }
  .ref-row { font-size: 11px; color: var(--text3); margin-top: 10px; line-height: 1.8; }

  /* Loading / empty */
  .loading-state { display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 60px 20px; gap: 14px; }
  .loading-state .spinner { width: 28px; height: 28px; border: 2px solid var(--border); border-top-color: var(--accent); border-radius: 50%; animation: spin .7s linear infinite; }
  @keyframes spin { to { transform: rotate(360deg); } }
  .loading-state p { font-size: 13px; color: var(--text2); }
  .empty { padding: 40px 20px; text-align: center; font-size: 13px; color: var(--text3); }

  /* Mobile adjustments */
  @media (max-width: 480px) {
    .metrics { grid-template-columns: repeat(3, 1fr); }
    .metric .m-val { font-size: 18px; }
    .tab { font-size: 12px; padding: 7px 6px; }
    .tab i { display: none; }
    .header-left h1 { font-size: 14px; }
    .chart-wrap { height: 200px; }
  }
</style>
</head>
<body>

<div class="header">
  <div class="header-left">
    <h1>PSA10 相場</h1>
    <span class="badge">LIVE</span>
  </div>
  <div class="header-right">
    <div class="status-dot loading" id="dot"></div>
    <span id="statusText">読み込み中...</span>
    <button class="reload-btn" onclick="loadData()"><i class="ti ti-refresh"></i> 更新</button>
  </div>
</div>

<div class="container">
  <div id="loadingView" class="loading-state">
    <div class="spinner"></div>
    <p>データを取得しています...</p>
  </div>

  <div id="mainView" style="display:none">
    <div class="metrics" id="metrics"></div>

    <div class="tabs">
      <button class="tab active" onclick="switchTab('chart',this)"><i class="ti ti-chart-line"></i> 価格推移</button>
      <button class="tab" onclick="switchTab('table',this)"><i class="ti ti-layout-list"></i> 相場一覧</button>
      <button class="tab" onclick="switchTab('profit',this)"><i class="ti ti-calculator"></i> 仕入れ判断</button>
    </div>

    <!-- 価格推移 -->
    <div id="tab-chart" class="tab-panel active">
      <div class="card">
        <div class="card-title"><i class="ti ti-cards"></i> カードを選択</div>
        <select id="cardSelect" onchange="renderChart()"></select>
        <div id="chartStats" style="display:flex;gap:20px;margin-bottom:12px;flex-wrap:wrap"></div>
        <div class="chart-wrap">
          <canvas id="priceChart" role="img" aria-label="選択したカードの価格推移グラフ">価格推移データ</canvas>
        </div>
      </div>
    </div>

    <!-- 相場一覧 -->
    <div id="tab-table" class="tab-panel">
      <div class="card">
        <div class="card-title"><i class="ti ti-sort-descending-numbers"></i> 平均価格の高い順</div>
        <div class="tbl-wrap">
          <table>
            <thead>
              <tr>
                <th>カード名</th>
                <th>レア</th>
                <th>件数</th>
                <th>高値</th>
                <th>安値</th>
                <th>平均</th>
              </tr>
            </thead>
            <tbody id="tableBody"></tbody>
          </table>
        </div>
      </div>
    </div>

    <!-- 仕入れ判断 -->
    <div id="tab-profit" class="tab-panel">
      <div class="card">
        <div class="card-title"><i class="ti ti-cards"></i> 対象カード</div>
        <select id="profitCard" onchange="calcProfit()"></select>

        <div class="form-row">
          <label>仕入れ値</label>
          <input type="number" id="buyPrice" placeholder="90000" oninput="calcProfit()">
          <span class="unit">円</span>
        </div>
        <div class="form-row">
          <label>手数料率</label>
          <input type="number" id="feeRate" value="10" min="0" max="30" step="0.5" oninput="calcProfit()">
          <span class="unit">%（SNKRDUNK 約10%）</span>
        </div>

        <div id="profitResult"></div>
      </div>
    </div>
  </div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/sql.js/1.10.2/sql-wasm.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.js"></script>
<script>
const DB_URL = 'https://raw.githubusercontent.com/kibidango-kinako/price-tracker/main/data/psa10_database.db';
let db = null;
let chartInst = null;

function setStatus(msg, state) {
  document.getElementById('statusText').textContent = msg;
  const dot = document.getElementById('dot');
  dot.className = 'status-dot ' + state;
}

async function loadData() {
  setStatus('読み込み中...', 'loading');
  document.getElementById('loadingView').style.display = 'flex';
  document.getElementById('mainView').style.display = 'none';
  try {
    const res = await fetch(DB_URL + '?t=' + Date.now());
    if (!res.ok) throw new Error('HTTP ' + res.status);
    const buf = await res.arrayBuffer();
    const SQL = await initSqlJs({ locateFile: f => 'https://cdnjs.cloudflare.com/ajax/libs/sql.js/1.10.2/' + f });
    db = new SQL.Database(new Uint8Array(buf));
    const now = new Date().toLocaleString('ja-JP', { month:'numeric', day:'numeric', hour:'2-digit', minute:'2-digit' });
    setStatus(now + ' 更新', 'ok');
    buildDashboard();
  } catch(e) {
    setStatus('読み込み失敗', 'error');
    document.getElementById('loadingView').innerHTML = '<p style="color:#e05555;font-size:13px">データの取得に失敗しました。<br>GitHubのリポジトリ設定を確認してください。</p>';
  }
}

function q(sql, params) {
  const res = db.exec(sql, params || []);
  if (!res.length) return [];
  const { columns, values } = res[0];
  return values.map(r => Object.fromEntries(columns.map((c, i) => [c, r[i]])));
}

function fmt(v) { return v != null ? '¥' + parseInt(v).toLocaleString() : '—'; }

function buildDashboard() {
  document.getElementById('loadingView').style.display = 'none';
  document.getElementById('mainView').style.display = 'block';
  buildMetrics();
  buildCardSelects();
  buildTable();
  renderChart();
}

function buildMetrics() {
  const r = q('SELECT COUNT(*) as cnt, MIN(price) as mn, MAX(price) as mx, CAST(AVG(price) AS INT) as avg, COUNT(DISTINCT card_name) as cards, COUNT(DISTINCT collected_date) as days FROM psa10_transactions')[0];
  document.getElementById('metrics').innerHTML = `
    <div class="metric"><div class="m-label">取引件数</div><div class="m-val">${r.cnt}</div><div class="m-sub">累計</div></div>
    <div class="metric accent"><div class="m-label">最高値</div><div class="m-val">${(r.mx/10000).toFixed(1)}万</div><div class="m-sub">円</div></div>
    <div class="metric"><div class="m-label">最安値</div><div class="m-val">${(r.mn/10000).toFixed(1)}万</div><div class="m-sub">円</div></div>
    <div class="metric"><div class="m-label">平均単価</div><div class="m-val">${(r.avg/10000).toFixed(1)}万</div><div class="m-sub">円</div></div>
    <div class="metric"><div class="m-label">銘柄数</div><div class="m-val">${r.cards}</div><div class="m-sub">カード</div></div>
    <div class="metric"><div class="m-label">蓄積日数</div><div class="m-val">${r.days}</div><div class="m-sub">日分</div></div>
  `;
}

function buildCardSelects() {
  const cards = q('SELECT DISTINCT card_name FROM psa10_transactions ORDER BY card_name');
  const opts = cards.map(c => `<option value="${c.card_name}">${c.card_name}</option>`).join('');
  document.getElementById('cardSelect').innerHTML = opts;
  document.getElementById('profitCard').innerHTML = opts;
}

function renderChart() {
  const card = document.getElementById('cardSelect').value;
  const rows = q('SELECT transaction_date, price FROM psa10_transactions WHERE card_name=? ORDER BY transaction_date', [card]);
  const labels = rows.map(r => r.transaction_date ? r.transaction_date.substring(0,10) : '');
  const prices = rows.map(r => r.price);

  const stats = q('SELECT MIN(price) as mn, MAX(price) as mx, CAST(AVG(price) AS INT) as avg FROM psa10_transactions WHERE card_name=?', [card])[0];
  document.getElementById('chartStats').innerHTML = `
    <span style="font-size:12px;color:#e05555">高値 ${fmt(stats.mx)}</span>
    <span style="font-size:12px;color:#4caf7d">安値 ${fmt(stats.mn)}</span>
    <span style="font-size:12px;color:#f0f0f0;font-weight:600">平均 ${fmt(stats.avg)}</span>
  `;

  if (chartInst) chartInst.destroy();
  chartInst = new Chart(document.getElementById('priceChart'), {
    type: 'line',
    data: {
      labels,
      datasets: [{
        label: '取引価格',
        data: prices,
        borderColor: '#e8a020',
        backgroundColor: 'rgba(232,160,32,0.06)',
        borderWidth: 2,
        pointRadius: 5,
        pointBackgroundColor: '#e8a020',
        pointBorderColor: '#0f0f0f',
        pointBorderWidth: 2,
        tension: 0.3,
        fill: true
      }]
    },
    options: {
      responsive: true,
      maintainAspectRatio: false,
      plugins: {
        legend: { display: false },
        tooltip: { callbacks: { label: ctx => '¥' + ctx.raw.toLocaleString() } }
      },
      scales: {
        x: { ticks: { color: '#666', font: { size: 11 }, maxTicksLimit: 8 }, grid: { color: 'rgba(255,255,255,0.05)' } },
        y: { ticks: { color: '#666', font: { size: 11 }, callback: v => '¥' + (v/10000).toFixed(0) + '万' }, grid: { color: 'rgba(255,255,255,0.05)' } }
      }
    }
  });
}

function buildTable() {
  const rows = q('SELECT card_name, rarity, COUNT(*) as cnt, MAX(price) as mx, MIN(price) as mn, CAST(AVG(price) AS INT) as avg FROM psa10_transactions GROUP BY card_name, rarity ORDER BY avg DESC');
  const badge = r => {
    const cls = ['SAR','SR','MA'].includes(r) ? 'r-' + r : 'r-other';
    return `<span class="rarity ${cls}">${r || '—'}</span>`;
  };
  document.getElementById('tableBody').innerHTML = rows.map(r => `
    <tr>
      <td class="card-name">${r.card_name}</td>
      <td>${badge(r.rarity)}</td>
      <td style="color:#666">${r.cnt}</td>
      <td class="price-high">${fmt(r.mx)}</td>
      <td class="price-low">${fmt(r.mn)}</td>
      <td class="price-avg">${fmt(r.avg)}</td>
    </tr>
  `).join('');
}

function calcProfit() {
  const card = document.getElementById('profitCard').value;
  const buy = parseInt(document.getElementById('buyPrice').value) || 0;
  const fee = parseFloat(document.getElementById('feeRate').value) || 10;
  if (!card || !buy) { document.getElementById('profitResult').innerHTML = '<div class="ref-row">仕入れ値を入力してください</div>'; return; }

  const r = q('SELECT MIN(price) as mn, MAX(price) as mx, CAST(AVG(price) AS INT) as avg, COUNT(*) as cnt FROM psa10_transactions WHERE card_name=?', [card])[0];
  const net = v => Math.round(v * (1 - fee / 100));
  const profit = v => net(v) - buy;
  const sign = v => v >= 0 ? '+' : '';
  const cls = v => v >= 0 ? 'pos' : 'neg';

  document.getElementById('profitResult').innerHTML = `
    <div class="profit-results">
      <div class="pr-item">
        <div class="pr-label">平均価格で売れたら</div>
        <div class="pr-val ${cls(profit(r.avg))}">${sign(profit(r.avg))}¥${Math.abs(profit(r.avg)).toLocaleString()}</div>
        <div class="pr-sub">手取 ¥${net(r.avg).toLocaleString()}</div>
      </div>
      <div class="pr-item">
        <div class="pr-label">安値で売れたら</div>
        <div class="pr-val ${cls(profit(r.mn))}">${sign(profit(r.mn))}¥${Math.abs(profit(r.mn)).toLocaleString()}</div>
        <div class="pr-sub">手取 ¥${net(r.mn).toLocaleString()}</div>
      </div>
      <div class="pr-item">
        <div class="pr-label">高値で売れたら</div>
        <div class="pr-val ${cls(profit(r.mx))}">${sign(profit(r.mx))}¥${Math.abs(profit(r.mx)).toLocaleString()}</div>
        <div class="pr-sub">手取 ¥${net(r.mx).toLocaleString()}</div>
      </div>
    </div>
    <div class="ref-row">参考: ${r.cnt}件の取引データ ／ 高値 ${fmt(r.mx)} ／ 安値 ${fmt(r.mn)} ／ 平均 ${fmt(r.avg)}</div>
  `;
}

function switchTab(name, btn) {
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
  document.querySelectorAll('.tab-panel').forEach(p => p.classList.remove('active'));
  btn.classList.add('active');
  document.getElementById('tab-' + name).classList.add('active');
  if (name === 'chart') renderChart();
}

loadData();
</script>
</body>
</html>
