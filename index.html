<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PSA10 相場ダッシュボード</title>
<style>
  :root {
    --bg: #0f0f0f; --bg2: #1a1a1a; --bg3: #242424;
    --border: rgba(255,255,255,0.08); --border2: rgba(255,255,255,0.14);
    --text: #f0f0f0; --text2: #888; --text3: #444;
    --accent: #e8a020; --accent2: #c47f10;
    --green: #4caf7d; --red: #e05555; --blue: #5b9cf6;
    --radius: 10px; --radius-lg: 14px;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: var(--bg); color: var(--text); font-family: 'Helvetica Neue','Hiragino Sans',sans-serif; min-height: 100vh; }

  .header { background: var(--bg2); border-bottom: 1px solid var(--border); padding: 14px 20px; display: flex; align-items: center; justify-content: space-between; position: sticky; top: 0; z-index: 100; }
  .header-left { display: flex; align-items: center; gap: 10px; }
  .header-left h1 { font-size: 16px; font-weight: 600; }
  .badge-live { background: var(--accent); color: #000; font-size: 10px; font-weight: 700; padding: 2px 7px; border-radius: 4px; letter-spacing: .06em; }
  .status-dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; background: var(--text3); }
  .status-dot.loading { background: var(--accent); animation: pulse 1s infinite; }
  .status-dot.ok     { background: var(--green); }
  .status-dot.error  { background: var(--red); }
  @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:.3} }
  .header-right { display: flex; align-items: center; gap: 8px; }
  #statusText { font-size: 12px; color: var(--text2); }
  .reload-btn { background: var(--bg3); border: 1px solid var(--border2); color: var(--text); padding: 6px 12px; border-radius: var(--radius); font-size: 12px; cursor: pointer; }
  .reload-btn:hover { background: var(--border2); }

  .container { max-width: 1200px; margin: 0 auto; padding: 20px 16px; }

  .panel { background: var(--bg2); border: 1px solid var(--border); border-radius: var(--radius-lg); padding: 16px; margin-bottom: 20px; }
  .section-title { font-size: 11px; color: var(--text2); font-weight: 500; text-transform: uppercase; letter-spacing: .08em; display: flex; align-items: center; gap: 6px; margin-bottom: 12px; }

  .chart-controls { display: flex; gap: 10px; margin-bottom: 12px; flex-wrap: wrap; }
  .chart-controls select { background: var(--bg3); border: 1px solid var(--border2); color: var(--text); padding: 7px 10px; border-radius: var(--radius); font-size: 12px; cursor: pointer; flex: 1; min-width: 160px; }
  .chart-controls select:focus { outline: none; border-color: var(--accent2); }

  .grade-tabs { display: flex; gap: 6px; flex-wrap: wrap; }
  .grade-tab { background: var(--bg3); border: 1px solid var(--border2); color: var(--text2); padding: 4px 12px; border-radius: 20px; font-size: 11px; cursor: pointer; transition: all .15s; white-space: nowrap; }
  .grade-tab:hover { border-color: var(--accent2); color: var(--text); }
  .grade-tab.active { background: rgba(232,160,32,.15); border-color: var(--accent); color: var(--accent); font-weight: 600; }

  .chart-stats { display: flex; gap: 20px; margin-bottom: 12px; flex-wrap: wrap; }
  .chart-stats span { font-size: 12px; }
  .chart-wrap { position: relative; width: 100%; height: 240px; }

  /* Table */
  .tbl-wrap { overflow-x: auto; -webkit-overflow-scrolling: touch; }
  table { width: 100%; border-collapse: collapse; font-size: 12px; min-width: 980px; }
  th {
    padding: 8px 10px; border-bottom: 1px solid var(--border);
    font-size: 10px; color: var(--text2); font-weight: 500;
    text-transform: uppercase; letter-spacing: .04em; white-space: nowrap;
    text-align: right; user-select: none;
  }
  th:first-child { text-align: left; }
  th.sortable { cursor: pointer; }
  th.sortable:hover { color: var(--text); }
  th.sort-active { color: var(--accent); }
  th .sort-icon { margin-left: 3px; font-size: 10px; }

  td { padding: 8px 10px; border-bottom: 1px solid var(--border); vertical-align: middle; text-align: right; }
  td:first-child { text-align: left; }
  tr:last-child td { border-bottom: none; }
  tbody tr { cursor: pointer; transition: background .1s; }
  tbody tr:hover td { background: rgba(255,255,255,.025); }
  tbody tr.active td { background: rgba(232,160,32,.07); }

  .card-link { color: var(--text); text-decoration: none; font-size: 12px; font-weight: 500; line-height: 1.4; }
  .card-link:hover { color: var(--accent); text-decoration: underline; }
  .card-meta { font-size: 10px; color: var(--text3); margin-top: 2px; }
  .rank-badge { display: inline-block; font-size: 10px; color: var(--text3); min-width: 26px; }

  .rarity { display: inline-block; font-size: 10px; font-weight: 700; padding: 1px 5px; border-radius: 4px; letter-spacing: .03em; white-space: nowrap; }
  .r-SAR { background: rgba(232,160,32,.15); color: var(--accent); border: 1px solid rgba(232,160,32,.3); }
  .r-HR  { background: rgba(224,85,85,.15);  color: var(--red);    border: 1px solid rgba(224,85,85,.3); }
  .r-SR  { background: rgba(91,156,246,.15); color: var(--blue);   border: 1px solid rgba(91,156,246,.3); }
  .r-MA  { background: rgba(76,175,125,.15); color: var(--green);  border: 1px solid rgba(76,175,125,.3); }
  .r-other { background: var(--bg3); color: var(--text2); border: 1px solid var(--border); }

  .price-high { color: var(--red); }
  .price-avg  { font-weight: 600; }
  .price-sub  { font-size: 11px; color: var(--text2); }

  .chg { font-size: 11px; font-weight: 700; white-space: nowrap; }
  .chg.up   { color: var(--green); }
  .chg.down { color: var(--red); }
  .chg.flat { color: var(--text3); }

  .buy-price { font-size: 11px; color: var(--text2); }

  .loading-state { display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 80px 20px; gap: 14px; }
  .spinner { width: 28px; height: 28px; border: 2px solid var(--border); border-top-color: var(--accent); border-radius: 50%; animation: spin .7s linear infinite; }
  @keyframes spin { to { transform: rotate(360deg); } }
  .loading-state p { font-size: 13px; color: var(--text2); }
</style>
</head>
<body>

<div class="header">
  <div class="header-left">
    <h1>PSA10 相場</h1>
    <span class="badge-live">LIVE</span>
  </div>
  <div class="header-right">
    <div class="status-dot loading" id="dot"></div>
    <span id="statusText">読み込み中...</span>
    <button class="reload-btn" onclick="loadData()">更新</button>
  </div>
</div>

<div class="container">
  <div id="loadingView" class="loading-state">
    <div class="spinner"></div>
    <p>データを取得しています...</p>
  </div>

  <div id="mainView" style="display:none">

    <!-- 価格推移 -->
    <div class="panel" id="chartPanel">
      <div class="section-title">価格推移</div>
      <div class="chart-controls">
        <select id="cardSelect" onchange="onCardChange()"></select>
        <div class="grade-tabs" id="gradeTabs"></div>
      </div>
      <div class="chart-stats" id="chartStats"></div>
      <div class="chart-wrap">
        <canvas id="priceChart"></canvas>
      </div>
    </div>

    <!-- 相場一覧 -->
    <div class="panel">
      <div class="section-title">相場一覧</div>
      <div class="tbl-wrap">
        <table>
          <thead>
            <tr>
              <th style="text-align:left">カード名 / 弾・No.</th>
              <th>レア</th>
              <th class="sortable" onclick="setSort('rank')" id="th-rank">ランク<span class="sort-icon" id="si-rank"></span></th>
              <th class="sortable" onclick="setSort('psa10_cnt')" id="th-psa10_cnt">PSA10<br>件数<span class="sort-icon" id="si-psa10_cnt"></span></th>
              <th class="sortable" onclick="setSort('psa10_avg')" id="th-psa10_avg">PSA10<br>平均<span class="sort-icon" id="si-psa10_avg"></span></th>
              <th class="sortable" onclick="setSort('a_avg')" id="th-a_avg">生カード(A)<br>平均<span class="sort-icon" id="si-a_avg"></span></th>
              <th class="sortable sort-active" onclick="setSort('dod')" id="th-dod">PSA10<br>前日比<span class="sort-icon" id="si-dod">↓</span></th>
              <th title="スニダン (手数料9.3%+送料¥240) で利益率10%になる仕入れ上限">仕入判断<br><span style="font-weight:400;text-transform:none;font-size:10px">SNKRDUNK</span></th>
              <th title="メルカリ (手数料10%+送料¥160) で利益率10%になる仕入れ上限">仕入判断<br><span style="font-weight:400;text-transform:none;font-size:10px">メルカリ</span></th>
            </tr>
          </thead>
          <tbody id="tableBody"></tbody>
        </table>
      </div>
    </div>
  </div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/sql.js/1.10.2/sql-wasm.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.js"></script>
<script>
const DB_URL = 'https://raw.githubusercontent.com/kibidango-kinako/price-tracker/main/data/ranking_database.db';
let db = null;
let chartInst = null;
let activeRow = null;
let tableData = [];
let sortCol = 'dod';
let sortDir = -1;
let selectedGrade = 'PSA10';

function setStatus(msg, state) {
  document.getElementById('statusText').textContent = msg;
  document.getElementById('dot').className = 'status-dot ' + state;
}

async function loadData() {
  setStatus('読み込み中...', 'loading');
  document.getElementById('loadingView').style.display = 'flex';
  document.getElementById('mainView').style.display = 'none';
  try {
    const res = await fetch(DB_URL + '?t=' + Date.now());
    if (!res.ok) throw new Error('HTTP ' + res.status);
    const SQL = await initSqlJs({ locateFile: f => 'https://cdnjs.cloudflare.com/ajax/libs/sql.js/1.10.2/' + f });
    db = new SQL.Database(new Uint8Array(await res.arrayBuffer()));
    const now = new Date().toLocaleString('ja-JP', { month:'numeric', day:'numeric', hour:'2-digit', minute:'2-digit' });
    setStatus(now + ' 更新', 'ok');
    buildDashboard();
  } catch(e) {
    setStatus('読み込み失敗', 'error');
    document.getElementById('loadingView').innerHTML =
      '<p style="color:#e05555;font-size:13px">データの取得に失敗しました。</p>';
  }
}

function q(sql, params) {
  const res = db.exec(sql, params || []);
  if (!res.length) return [];
  const { columns, values } = res[0];
  return values.map(r => Object.fromEntries(columns.map((c, i) => [c, r[i]])));
}

const fmt = v => v != null && v > 0 ? '¥' + parseInt(v).toLocaleString() : '—';
const escJs = s => (s || '').replace(/\\/g, '\\\\').replace(/'/g, "\\'");

function rarityBadge(r) {
  const cls = ['SAR','HR','SR','MA'].includes(r) ? 'r-' + r : 'r-other';
  return `<span class="rarity ${cls}">${r || '—'}</span>`;
}

function buildDashboard() {
  document.getElementById('loadingView').style.display = 'none';
  document.getElementById('mainView').style.display = 'block';
  buildTable();
  buildCardSelect();
  buildGradeTabs();
  renderChart();
}

// 前日比マップ (PSA10のみ): apparel_id -> [最新日avg, 前日avg]
function buildDodMap() {
  const rows = q(`
    SELECT apparel_id, collected_date, CAST(AVG(price) AS INT) as da
    FROM ranking_transactions
    WHERE grade = 'PSA10'
    GROUP BY apparel_id, collected_date
    ORDER BY apparel_id, collected_date DESC
  `);
  const map = {};
  rows.forEach(r => {
    if (!map[r.apparel_id]) map[r.apparel_id] = [];
    if (map[r.apparel_id].length < 2) map[r.apparel_id].push(r.da);
  });
  return map;
}

function buildTable() {
  const dodMap = buildDodMap();
  const rows = q(`
    SELECT
      apparel_id, card_name, rarity, set_name, collection_no, url,
      MIN(rank) as rank,
      SUM(CASE WHEN grade='PSA10' THEN 1 ELSE 0 END) as psa10_cnt,
      CAST(AVG(CASE WHEN grade='PSA10' THEN price ELSE NULL END) AS INT) as psa10_avg,
      SUM(CASE WHEN grade='A' THEN 1 ELSE 0 END) as a_cnt,
      CAST(AVG(CASE WHEN grade='A' THEN price ELSE NULL END) AS INT) as a_avg,
      COUNT(*) as total_cnt
    FROM ranking_transactions
    GROUP BY apparel_id
  `);

  tableData = rows.map(r => {
    const dod = dodMap[r.apparel_id];
    const dod_pct = (dod && dod.length >= 2) ? (dod[0] - dod[1]) / dod[1] * 100 : null;
    const psa10_avg = r.psa10_avg || 0;
    const snkr = psa10_avg > 0 ? Math.floor((psa10_avg * 0.907 - 240) / 1.10) : null;
    const mcr  = psa10_avg > 0 ? Math.floor((psa10_avg * 0.900 - 160) / 1.10) : null;
    return { ...r, dod: dod_pct, snkr: snkr > 0 ? snkr : null, mcr: mcr > 0 ? mcr : null };
  });

  renderTableBody();
}

function renderTableBody() {
  const sorted = [...tableData].sort((a, b) => {
    const va = a[sortCol], vb = b[sortCol];
    if (sortCol === 'rank') {
      if (!va && !vb) return 0;
      if (!va) return 1;
      if (!vb) return -1;
      return sortDir === -1 ? va - vb : vb - va;
    }
    if (va === null && vb === null) return 0;
    if (va === null) return 1;
    if (vb === null) return -1;
    return sortDir * (vb - va);
  });

  document.getElementById('tableBody').innerHTML = sorted.map(r => {
    const meta = [r.set_name, r.collection_no].filter(Boolean).join(' · ');
    const dodHtml = r.dod !== null
      ? `<span class="chg ${r.dod >= 0 ? 'up' : 'down'}">${r.dod >= 0 ? '▲' : '▼'}${Math.abs(r.dod).toFixed(1)}%</span>`
      : '<span class="chg flat">—</span>';

    return `
      <tr onclick="selectCard('${escJs(r.apparel_id)}', this)">
        <td>
          <a class="card-link" href="${r.url || '#'}" target="_blank" onclick="event.stopPropagation()">${r.card_name || '—'}</a>
          ${meta ? `<div class="card-meta">${meta}</div>` : ''}
        </td>
        <td style="text-align:center">${rarityBadge(r.rarity)}</td>
        <td><span class="rank-badge">${r.rank ? '#' + r.rank : '—'}</span></td>
        <td style="color:${r.psa10_cnt > 0 ? 'var(--blue)' : 'var(--text3)'}">${r.psa10_cnt || 0}</td>
        <td class="price-avg">${fmt(r.psa10_avg)}</td>
        <td class="price-sub">${fmt(r.a_avg)}</td>
        <td>${dodHtml}</td>
        <td class="buy-price">${r.snkr ? fmt(r.snkr) : '<span style="color:var(--text3)">—</span>'}</td>
        <td class="buy-price">${r.mcr  ? fmt(r.mcr)  : '<span style="color:var(--text3)">—</span>'}</td>
      </tr>`;
  }).join('');
}

function setSort(col) {
  sortDir = (sortCol === col) ? -sortDir : (col === 'rank' ? 1 : -1);
  sortCol = col;
  ['rank','psa10_cnt','psa10_avg','a_avg','dod'].forEach(c => {
    document.getElementById('th-' + c).classList.toggle('sort-active', c === col);
    document.getElementById('si-' + c).textContent = c === col ? (sortDir === -1 ? '↓' : '↑') : '';
  });
  renderTableBody();
}

// カード選択
function buildCardSelect() {
  const cards = q(`
    SELECT apparel_id, card_name, set_name, collection_no, MIN(rank) as rank
    FROM ranking_transactions
    GROUP BY apparel_id
    ORDER BY MIN(rank)
  `);
  document.getElementById('cardSelect').innerHTML = cards.map(c => {
    const meta = [c.set_name, c.collection_no].filter(Boolean).join(' · ');
    const label = `#${c.rank || '?'} ${c.card_name}${meta ? '  [' + meta + ']' : ''}`;
    return `<option value="${escJs(c.apparel_id)}">${label}</option>`;
  }).join('');
}

// グレードタブ
function buildGradeTabs() {
  const grades = q(`
    SELECT grade, COUNT(*) as cnt
    FROM ranking_transactions
    WHERE apparel_id = (SELECT apparel_id FROM ranking_transactions ORDER BY MIN(rank) LIMIT 1)
    GROUP BY grade ORDER BY cnt DESC
  `);
  rebuildGradeTabs(document.getElementById('cardSelect').value);
}

function rebuildGradeTabs(apId) {
  const grades = q(
    `SELECT grade, COUNT(*) as cnt FROM ranking_transactions WHERE apparel_id=? GROUP BY grade ORDER BY cnt DESC`,
    [apId]
  );
  const container = document.getElementById('gradeTabs');
  const allGrades = ['PSA10', ...grades.map(g => g.grade).filter(g => g !== 'PSA10')];

  // selectedGrade が存在しない場合は先頭に
  if (!allGrades.includes(selectedGrade)) selectedGrade = allGrades[0] || 'PSA10';

  container.innerHTML = allGrades.map(g => {
    const cnt = grades.find(r => r.grade === g)?.cnt || 0;
    return `<button class="grade-tab${g === selectedGrade ? ' active' : ''}" onclick="selectGrade('${g}')">${g} <span style="color:var(--text3)">${cnt}</span></button>`;
  }).join('');
}

function selectGrade(g) {
  selectedGrade = g;
  document.querySelectorAll('.grade-tab').forEach(el => {
    el.classList.toggle('active', el.textContent.trim().startsWith(g));
  });
  renderChart();
}

function onCardChange() {
  const apId = document.getElementById('cardSelect').value;
  rebuildGradeTabs(apId);
  renderChart();
}

function selectCard(apId, rowEl) {
  if (activeRow) activeRow.classList.remove('active');
  rowEl.classList.add('active');
  activeRow = rowEl;
  document.getElementById('cardSelect').value = apId;
  rebuildGradeTabs(apId);
  renderChart();
  document.getElementById('chartPanel').scrollIntoView({ behavior: 'smooth', block: 'start' });
}

function renderChart() {
  const apId = document.getElementById('cardSelect').value;
  if (!apId) return;

  const rows = q(
    `SELECT transaction_date, price FROM ranking_transactions
     WHERE apparel_id=? AND grade=? ORDER BY transaction_date`,
    [apId, selectedGrade]
  );

  const stats = q(
    `SELECT MIN(price) as mn, MAX(price) as mx, CAST(AVG(price) AS INT) as avg, COUNT(*) as cnt
     FROM ranking_transactions WHERE apparel_id=? AND grade=?`,
    [apId, selectedGrade]
  )[0];

  const labels = rows.map(r => (r.transaction_date || '').replace('T',' ').substring(5, 16));
  const prices = rows.map(r => r.price);

  document.getElementById('chartStats').innerHTML = stats ? `
    <span style="color:#e05555">高値 ${fmt(stats.mx)}</span>
    <span style="color:#4caf7d">安値 ${fmt(stats.mn)}</span>
    <span style="font-weight:600">平均 ${fmt(stats.avg)}</span>
    <span style="color:var(--text3);font-size:11px">${stats.cnt || 0}件</span>
  ` : '<span style="color:var(--text3);font-size:12px">このグレードのデータなし</span>';

  if (chartInst) chartInst.destroy();
  if (!prices.length) return;

  chartInst = new Chart(document.getElementById('priceChart'), {
    type: 'line',
    data: {
      labels,
      datasets: [{
        data: prices,
        borderColor: '#e8a020',
        backgroundColor: 'rgba(232,160,32,0.06)',
        borderWidth: 2,
        pointRadius: 5,
        pointBackgroundColor: '#e8a020',
        pointBorderColor: '#0f0f0f',
        pointBorderWidth: 2,
        tension: 0.3,
        fill: true
      }]
    },
    options: {
      responsive: true,
      maintainAspectRatio: false,
      plugins: {
        legend: { display: false },
        tooltip: { callbacks: { label: ctx => '¥' + ctx.raw.toLocaleString() } }
      },
      scales: {
        x: { ticks: { color:'#666', font:{size:11}, maxTicksLimit:8, maxRotation:30 }, grid: { color:'rgba(255,255,255,0.05)' } },
        y: {
          ticks: { color:'#666', font:{size:11}, callback: v => v >= 10000 ? '¥'+(v/10000).toFixed(0)+'万' : '¥'+v.toLocaleString() },
          grid: { color:'rgba(255,255,255,0.05)' }
        }
      }
    }
  });
}

loadData();
</script>
</body>
</html>
