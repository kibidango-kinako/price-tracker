<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PSA10 相場ダッシュボード</title>
<style>
  :root {
    --bg:#0f0f0f; --bg2:#1a1a1a; --bg3:#242424;
    --border:rgba(255,255,255,0.08); --border2:rgba(255,255,255,0.14);
    --text:#f0f0f0; --text2:#888; --text3:#444;
    --accent:#e8a020; --accent2:#c47f10;
    --green:#4caf7d; --red:#e05555; --blue:#5b9cf6;
    --radius:10px; --radius-lg:14px;
  }
  *{box-sizing:border-box;margin:0;padding:0;}
  body{background:var(--bg);color:var(--text);font-family:'Helvetica Neue','Hiragino Sans',sans-serif;min-height:100vh;}

  /* ===== HEADER ===== */
  .header{background:var(--bg2);border-bottom:1px solid var(--border);padding:12px 20px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:200;gap:12px;}
  .header-left{display:flex;align-items:center;gap:10px;flex-shrink:0;}
  .header-left h1{font-size:16px;font-weight:600;}
  .badge-live{background:var(--accent);color:#000;font-size:10px;font-weight:700;padding:2px 7px;border-radius:4px;letter-spacing:.06em;}
  .status-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0;background:var(--text3);}
  .status-dot.loading{background:var(--accent);animation:pulse 1s infinite;}
  .status-dot.ok{background:var(--green);}
  .status-dot.error{background:var(--red);}
  @keyframes pulse{0%,100%{opacity:1}50%{opacity:.3}}
  .header-right{display:flex;align-items:center;gap:8px;}
  #statusText{font-size:12px;color:var(--text2);white-space:nowrap;}
  .reload-btn{background:var(--bg3);border:1px solid var(--border2);color:var(--text);padding:5px 10px;border-radius:var(--radius);font-size:12px;cursor:pointer;white-space:nowrap;}
  .reload-btn:hover{background:var(--border2);}

  /* ===== LAYOUT ===== */
  .container{max-width:1200px;margin:0 auto;padding:16px;}
  .panel{background:var(--bg2);border:1px solid var(--border);border-radius:var(--radius-lg);padding:16px;margin-bottom:16px;}
  .section-title{font-size:11px;color:var(--text2);font-weight:500;text-transform:uppercase;letter-spacing:.08em;margin-bottom:12px;}

  /* ===== CHART SELECT ===== */
  .chart-card-name{font-size:15px;font-weight:700;color:var(--text);margin-bottom:8px;min-height:20px;}
  .search-select-row{display:flex;gap:8px;margin-bottom:8px;align-items:center;}
  .search-icon-wrap{position:relative;flex:1;}
  .search-icon-wrap::before{content:'🔍';position:absolute;left:9px;top:50%;transform:translateY(-50%);font-size:12px;pointer-events:none;}
  .chart-search-input,select{background:var(--bg3);border:1px solid var(--border2);color:var(--text);padding:7px 10px 7px 32px;border-radius:var(--radius);font-size:12px;outline:none;transition:border-color .15s;width:100%;}
  select{padding-left:10px;}
  .chart-search-input:focus,select:focus{border-color:var(--accent2);}

  /* ===== STATS GRID ===== */
  .stats-row{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:8px;}
  .stat-box{background:var(--bg3);border-radius:8px;padding:7px 10px;min-width:90px;flex:1;}
  .stat-box-label{font-size:10px;color:var(--text3);margin-bottom:2px;white-space:nowrap;}
  .stat-box-val{font-size:13px;font-weight:700;white-space:nowrap;}
  .stat-box-sub{font-size:10px;color:var(--text2);margin-top:2px;white-space:nowrap;}

  /* ===== SIGNAL BADGE ===== */
  .signal-row{display:flex;align-items:center;gap:10px;margin-bottom:10px;flex-wrap:wrap;}
  .signal-label-text{font-size:11px;color:var(--text2);}
  .signal-badge{display:inline-block;padding:3px 12px;border-radius:4px;font-size:13px;font-weight:700;letter-spacing:.03em;}
  .sig-strong-buy{background:rgba(76,175,125,.2);color:var(--green);border:1px solid rgba(76,175,125,.4);}
  .sig-buy       {background:rgba(91,156,246,.2);color:var(--blue); border:1px solid rgba(91,156,246,.4);}
  .sig-neutral   {background:rgba(136,136,136,.2);color:#888;       border:1px solid rgba(136,136,136,.3);}
  .sig-sell      {background:rgba(232,160,32,.2); color:var(--accent);border:1px solid rgba(232,160,32,.4);}
  .sig-strong-sell{background:rgba(224,85,85,.2);color:var(--red);  border:1px solid rgba(224,85,85,.4);}
  .sig-no-data   {background:var(--bg3);color:var(--text3);border:1px solid var(--border);}
  .signal-score{font-size:11px;color:var(--text3);}
  .label-toggle-btn{background:var(--bg3);border:1px solid var(--border2);color:var(--text2);padding:3px 10px;border-radius:6px;font-size:11px;cursor:pointer;transition:all .15s;}
  .label-toggle-btn.active{border-color:var(--accent);color:var(--accent);}

  /* ===== CHART ===== */
  .chart-wrap{position:relative;width:100%;height:260px;}
  .chart-legend{display:flex;gap:14px;margin-top:8px;flex-wrap:wrap;}
  .legend-item{display:flex;align-items:center;gap:5px;font-size:11px;color:var(--text2);}

  /* ===== FILTER BAR ===== */
  .filter-bar{display:flex;gap:8px;margin-bottom:10px;align-items:center;flex-wrap:wrap;}
  .search-wrap{position:relative;flex:1;min-width:160px;}
  .search-wrap::before{content:'🔍';position:absolute;left:9px;top:50%;transform:translateY(-50%);font-size:12px;pointer-events:none;}
  .search-input{width:100%;background:var(--bg3);border:1px solid var(--border2);color:var(--text);padding:7px 10px 7px 32px;border-radius:var(--radius);font-size:13px;outline:none;transition:border-color .15s;}
  .search-input:focus{border-color:var(--accent2);}
  .filter-chips{display:flex;gap:5px;flex-wrap:nowrap;overflow-x:auto;-webkit-overflow-scrolling:touch;scrollbar-width:none;-ms-overflow-style:none;padding-bottom:2px;min-width:0;}
  .filter-chips::-webkit-scrollbar{display:none;}
  .chip{padding:4px 10px;border-radius:20px;font-size:11px;font-weight:600;cursor:pointer;border:1px solid var(--border2);background:var(--bg3);color:var(--text2);transition:all .15s;white-space:nowrap;}
  .chip:hover{border-color:var(--accent2);color:var(--text);}
  .chip.active{background:var(--accent);border-color:var(--accent);color:#000;}
  .result-count{font-size:12px;color:var(--text3);white-space:nowrap;}
  .set-filter-wrap{flex:0 0 auto;}
  .set-filter-wrap select{padding:5px 8px;font-size:12px;background:var(--bg3);border:1px solid var(--border2);color:var(--text);border-radius:var(--radius);outline:none;cursor:pointer;max-width:220px;}

  /* ===== RARITY BADGES ===== */
  .rarity{display:inline-block;font-size:10px;font-weight:700;padding:1px 5px;border-radius:4px;letter-spacing:.03em;white-space:nowrap;}
  .r-SAR{background:rgba(232,160,32,.15);color:var(--accent);border:1px solid rgba(232,160,32,.3);}
  .r-HR {background:rgba(224,85,85,.15); color:var(--red);   border:1px solid rgba(224,85,85,.3);}
  .r-SR {background:rgba(91,156,246,.15);color:var(--blue);  border:1px solid rgba(91,156,246,.3);}
  .r-MA {background:rgba(76,175,125,.15);color:var(--green); border:1px solid rgba(76,175,125,.3);}
  .r-MUR{background:rgba(200,100,246,.15);color:#d080f6;     border:1px solid rgba(200,100,246,.3);}
  .r-other{background:var(--bg3);color:var(--text2);border:1px solid var(--border);}

  /* ===== TABLE (desktop) ===== */
  .tbl-outer{overflow-x:auto;-webkit-overflow-scrolling:touch;max-height:62vh;border-radius:var(--radius);}
  table{width:100%;border-collapse:collapse;font-size:12px;min-width:900px;}
  thead{position:sticky;top:0;z-index:10;}
  th{padding:8px 10px;border-bottom:2px solid var(--border2);font-size:10px;color:var(--text2);font-weight:500;text-transform:uppercase;letter-spacing:.04em;white-space:nowrap;text-align:right;user-select:none;background:var(--bg2);}
  th:first-child{text-align:left;}
  th.sortable{cursor:pointer;}
  th.sortable:hover{color:var(--text);}
  th.sort-active{color:var(--accent);}
  th .sort-icon{margin-left:3px;font-size:10px;}
  td{padding:7px 10px;border-bottom:1px solid var(--border);vertical-align:middle;text-align:right;}
  td:first-child{text-align:left;}
  tr:last-child td{border-bottom:none;}
  tbody tr{cursor:pointer;transition:background .1s;}
  tbody tr:hover td{background:rgba(255,255,255,.03);}
  tbody tr.active td{background:rgba(232,160,32,.08);}
  tbody tr.active .card-link{color:var(--accent);}
  .card-link{color:var(--text);text-decoration:none;font-size:12px;font-weight:500;line-height:1.4;}
  .card-link:hover{color:var(--accent);}
  .card-meta{font-size:10px;color:var(--text3);margin-top:2px;}
  .price-avg{font-weight:600;}
  .chg{font-size:11px;font-weight:700;white-space:nowrap;}
  .chg.up{color:var(--green);}
  .chg.down{color:var(--red);}
  .chg.flat{color:var(--text3);}
  .buy-price{font-size:11px;color:var(--text2);}
  .empty-state{text-align:center;padding:40px;color:var(--text3);font-size:13px;}

  /* ===== MOBILE SORT SELECT ===== */
  .mobile-sort-bar{display:none;gap:6px;margin-bottom:8px;align-items:center;}
  .mobile-sort-bar label{font-size:11px;color:var(--text3);white-space:nowrap;}
  .mobile-sort-bar select{flex:1;max-width:160px;padding:5px 7px;font-size:11px;}
  .mobile-sort-btn{background:var(--bg3);border:1px solid var(--border2);color:var(--text2);padding:5px 8px;border-radius:var(--radius);font-size:11px;cursor:pointer;white-space:nowrap;}
  .mobile-sort-btn:hover{border-color:var(--accent2);}

  /* ===== CHART PANEL TOGGLE ===== */
  .chart-panel-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:8px;}
  .chart-panel-header .section-title{margin-bottom:0;}
  .chart-toggle-btn{display:none;background:var(--bg3);border:1px solid var(--border2);color:var(--text2);padding:4px 12px;border-radius:6px;font-size:11px;cursor:pointer;white-space:nowrap;}
  .chart-toggle-btn:hover{border-color:var(--accent2);color:var(--text);}

  /* ===== COMPACT MOBILE CARD ===== */
  .mc-card{padding:8px 12px;}
  .mc-row1{display:flex;align-items:center;justify-content:space-between;gap:6px;margin-bottom:3px;}
  .mc-name-area{display:flex;align-items:center;gap:5px;min-width:0;flex:1;overflow:hidden;}
  .mc-name{font-size:12px;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;flex:1;min-width:0;color:var(--text);text-decoration:none;}
  .mc-name:hover{color:var(--accent);}
  .mc-trend{font-size:10px !important;padding:1px 6px !important;flex-shrink:0;}
  .mc-row2{display:flex;align-items:baseline;gap:8px;margin-bottom:2px;}
  .mc-avg{font-size:16px;font-weight:700;white-space:nowrap;}
  .mc-meta{font-size:11px;color:var(--text2);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;flex:1;}
  .mc-row3{display:flex;align-items:center;justify-content:space-between;font-size:10px;color:var(--text3);gap:6px;}
  .mc-hilow{white-space:nowrap;}
  .mc-buy{white-space:nowrap;color:var(--text2);flex-shrink:0;}

  /* card row override styles */
  .card-row{background:var(--bg2);border:1px solid var(--border);border-radius:8px;margin-bottom:6px;cursor:pointer;transition:border-color .15s,background .15s;}
  .card-row:hover{border-color:var(--border2);}
  .card-row.active{border-color:var(--accent) !important;background:rgba(232,160,32,.04);}
  .card-row.active .mc-name{color:var(--accent);}
  .card-row td{display:block;border:none;padding:0;text-align:left !important;}

  /* ===== LOADING ===== */
  .loading-state{display:flex;flex-direction:column;align-items:center;justify-content:center;padding:80px 20px;gap:14px;}
  .spinner{width:28px;height:28px;border:2px solid var(--border);border-top-color:var(--accent);border-radius:50%;animation:spin .7s linear infinite;}
  @keyframes spin{to{transform:rotate(360deg);}}
  .loading-state p{font-size:13px;color:var(--text2);}

  /* ===== SCROLL TOP ===== */
  #scrollTopBtn{position:fixed;bottom:20px;right:20px;z-index:300;background:var(--accent);color:#000;border:none;width:38px;height:38px;border-radius:50%;font-size:16px;cursor:pointer;display:none;align-items:center;justify-content:center;box-shadow:0 2px 12px rgba(0,0,0,.4);}
  #scrollTopBtn.show{display:flex;}

  /* ===== RESPONSIVE ===== */
  @media(max-width:767px){
    .header{padding:10px 12px;}
    .container{padding:10px;}
    /* テーブルモードを隠してカードモードを表示 */
    .tbl-outer{overflow:visible;max-height:none;}
    table{min-width:0;display:block;}
    thead{display:none !important;}
    tbody{display:block;}
    /* mobile sort bar */
    .mobile-sort-bar{display:flex;}
    /* chart */
    .chart-wrap{height:180px !important;}
    .chart-toggle-btn{display:inline-flex;align-items:center;}
    #chartPanelBody.chart-collapsed{display:none;}
    /* stats compact */
    .stats-row{gap:5px;}
    .stat-box{min-width:60px;padding:5px 7px;}
    .stat-box-val{font-size:12px;}
    .stat-box-sub{font-size:9px;}
    /* filter bar: search full-width, chips below */
    .filter-bar{flex-wrap:wrap;}
    .search-wrap{flex:1 1 100%;min-width:0;}
    /* chips: flex itemとして幅を正しく縮める */
    .filter-chips{flex:1;min-width:0;}
    /* セットフィルター: モバイルでは幅を抑える */
    .set-filter-wrap{flex:0 0 auto;}
    .set-filter-wrap select{max-width:140px;font-size:11px;padding:4px 6px;}
    /* card-row を明示的にblockにしてコンテナ幅に収める */
    .card-row{display:block;width:100%;}
  }
  @media(min-width:768px){
    /* hide-mobile classを有効に */
    .hide-mobile{display:none!important;}
    /* card-row はデスクトップでは通常の<tr>と同じ見た目にする */
    .card-row{background:none;border:none;border-radius:0;margin:0;}
    .card-row:hover td{background:rgba(255,255,255,.03);}
    .card-row.active td{background:rgba(232,160,32,.08);}
    .card-row td{display:table-cell;border-bottom:1px solid var(--border);padding:7px 10px;}
  }
</style>
</head>
<body>

<div class="header">
  <div class="header-left">
    <h1>PSA10 相場</h1>
    <span class="badge-live">LIVE</span>
  </div>
  <div class="header-right">
    <div class="status-dot loading" id="dot"></div>
    <span id="statusText">読み込み中...</span>
    <button class="reload-btn" onclick="loadData()">更新</button>
  </div>
</div>

<div class="container">
  <div id="loadingView" class="loading-state">
    <div class="spinner"></div>
    <p>データを取得しています...</p>
  </div>

  <div id="mainView" style="display:none">

    <!-- 価格推移チャート -->
    <div class="panel" id="chartPanel">
      <div class="chart-panel-header">
        <div class="section-title">価格推移 (PSA10)</div>
        <button class="chart-toggle-btn" id="chartToggleBtn" onclick="toggleChartPanel()">▼ チャートを開く</button>
      </div>
      <div id="chartPanelBody">
        <div class="chart-card-name" id="chartCardName">—</div>
        <div class="search-select-row">
          <div class="search-icon-wrap" style="flex:1">
            <input class="chart-search-input" type="text" id="chartSearchInput" placeholder="カードを検索してチャートを切替...">
          </div>
        </div>
        <select id="cardSelect" onchange="onSelectChange()" style="margin-bottom:10px"></select>
        <div class="stats-row" id="statsRow1"></div>
        <div class="stats-row" id="statsRow2"></div>
        <div class="signal-row" id="signalRow"></div>
        <div class="chart-wrap"><canvas id="priceChart"></canvas></div>
        <div class="chart-legend" id="chartLegend"></div>
      </div><!-- /chartPanelBody -->
    </div>

    <!-- 相場一覧 -->
    <div class="panel">
      <div class="section-title">相場一覧 (PSA10)</div>

      <!-- フィルターバー -->
      <div class="filter-bar">
        <div class="search-wrap">
          <input class="search-input" type="text" id="tableSearch" placeholder="カード名で絞り込み">
        </div>
        <div class="set-filter-wrap">
          <select id="setFilter" onchange="onSetFilterChange()"></select>
        </div>
        <div class="filter-chips" id="rarityChips"></div>
        <span class="result-count" id="resultCount"></span>
      </div>

      <!-- モバイル用ソート（.mobile-sort-barのCSS側で表示制御） -->
      <div class="mobile-sort-bar" id="mobileSortBar">
        <label>並替:</label>
        <select id="mobileSortSelect" onchange="onMobileSortChange()">
          <option value="dod">前日比</option>
          <option value="trendScore">判定</option>
          <option value="avg">平均価格</option>
          <option value="mx">高値</option>
          <option value="mn">安値</option>
          <option value="cnt">件数</option>
          <option value="rank">ランク</option>
        </select>
        <button class="mobile-sort-btn" id="mobileSortDirBtn" onclick="toggleMobileSortDir()">↓ 降順</button>
      </div>

      <!-- テーブル -->
      <div class="tbl-outer">
        <table>
          <thead>
            <tr>
              <th style="text-align:left;min-width:160px">カード名 / 弾名</th>
              <th style="min-width:48px">レア</th>
              <th class="sortable" onclick="setSort('rank')"       id="th-rank">ランク<span class="sort-icon" id="si-rank"></span></th>
              <th class="sortable" onclick="setSort('cnt')"        id="th-cnt">件数<span class="sort-icon" id="si-cnt"></span></th>
              <th class="sortable" onclick="setSort('mx')"         id="th-mx">高値<span class="sort-icon" id="si-mx"></span></th>
              <th class="sortable" onclick="setSort('mn')"         id="th-mn">安値<span class="sort-icon" id="si-mn"></span></th>
              <th class="sortable" onclick="setSort('avg')"        id="th-avg">平均<span class="sort-icon" id="si-avg"></span></th>
              <th class="sortable sort-active" onclick="setSort('dod')"        id="th-dod">前日比<span class="sort-icon" id="si-dod">↓</span></th>
              <th class="sortable" onclick="setSort('trendScore')" id="th-trendScore" title="MA5/10/20によるトレンド判定">判定<span class="sort-icon" id="si-trendScore"></span></th>
              <th class="hide-mobile" title="スニダン(手数料9.3%+送料¥240)で利益率10%の仕入上限">仕入上限<br><span style="font-weight:400;font-size:9px;text-transform:none">SNKRDUNK</span></th>
              <th class="hide-mobile" title="メルカリ(手数料10%+送料¥160)で利益率10%の仕入上限">仕入上限<br><span style="font-weight:400;font-size:9px;text-transform:none">メルカリ</span></th>
            </tr>
          </thead>
          <tbody id="tableBody"></tbody>
        </table>
        <div id="emptyState" class="empty-state" style="display:none">該当するカードが見つかりません</div>
      </div>
    </div>
  </div>
</div>

<button id="scrollTopBtn" onclick="window.scrollTo({top:0,behavior:'smooth'})" title="トップへ">↑</button>

<script src="https://cdnjs.cloudflare.com/ajax/libs/sql.js/1.10.2/sql-wasm.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.js"></script>

}

// ===== LOAD =====
async function loadData() {
  setStatus('読み込み中...','loading');
  document.getElementById('loadingView').style.display = 'flex';
  document.getElementById('mainView').style.display = 'none';
  try {
    const res = await fetch(DB_URL + '?t=' + Date.now());
    if (!res.ok) throw new Error('HTTP ' + res.status);
    const SQL = await initSqlJs({ locateFile: f => 'https://cdnjs.cloudflare.com/ajax/libs/sql.js/1.10.2/' + f });
    db = new SQL.Database(new Uint8Array(await res.arrayBuffer()));
    const now = new Date().toLocaleString('ja-JP',{month:'numeric',day:'numeric',hour:'2-digit',minute:'2-digit'});
    setStatus(now + ' 更新','ok');
    buildDashboard();
  } catch(e) {
    setStatus('読み込み失敗','error');
    document.getElementById('loadingView').innerHTML = '<p style="color:#e05555;font-size:13px">データの取得に失敗しました。</p>';
  }
}

function q(sql, params) {
  const res = db.exec(sql, params || []);
  if (!res.length) return [];
  const { columns, values } = res[0];
  return values.map(r => Object.fromEntries(columns.map((c,i) => [c, r[i]])));
}

// ===== MA =====
function calcMA(data, period) {
  return data.map((_, i) => {
    if (i < period - 1) return null;
    const s = data.slice(i - period + 1, i + 1);
    return Math.round(s.reduce((a,b) => a+b, 0) / period);
  });
}

// ===== 24h/48h変化 =====
function getTimeWindowChange(apId, hours) {
  const maxRes = q('SELECT MAX(transaction_date) as d FROM ranking_transactions WHERE apparel_id=?', [apId]);
  if (!maxRes.length || !maxRes[0].d) return null;
  const maxDate = maxRes[0].d;
  // 同一 transaction_date に複数取引がある場合、個別行の first/last は順序不定になるため
  // 時刻バケット（分単位）ごとに AVG を取り、最古バケットと最新バケットの平均価格を比較する
  const rows = q(
    `SELECT transaction_date, CAST(AVG(price) AS INT) as avg_p, COUNT(*) as cnt
     FROM ranking_transactions
     WHERE apparel_id=? AND transaction_date >= datetime(?, '-${hours} hours')
     GROUP BY transaction_date
     ORDER BY transaction_date ASC`,
    [apId, maxDate]
  );
  if (!rows.length) return { count:0, diff:null };
  const totalCnt = rows.reduce((a, r) => a + r.cnt, 0);
  if (rows.length === 1) return { count:totalCnt, diff:null, price:rows[0].avg_p };
  const oldest = rows[0].avg_p;
  const newest = rows[rows.length - 1].avg_p;
  const diff = newest - oldest;
  return { oldest, newest, diff, pct:(diff/oldest)*100, count:totalCnt };
}

// ===== TREND SIGNAL =====
const TREND_SCORE_MAP = { 'strong-buy':5,'buy':4,'neutral':3,'sell':2,'strong-sell':1,'no-data':0 };
const TREND_LABEL_MAP = { 'strong-buy':'強い買い','buy':'買い','neutral':'中立','sell':'売り','strong-sell':'強い売り','no-data':'—' };

function getTrendSignal(prices, ma5, ma10, ma20) {
  const n = prices.length;
  if (n === 0) return { signal:'—', cls:'no-data', score:0, maxScore:0, dataPoints:n, lastMA5:null, lastMA10:null, lastMA20:null };
  const lastPrice = prices[n-1];
  const lastMA5  = n >= 5  ? ma5[n-1]  : null;
  const lastMA10 = n >= 10 ? ma10[n-1] : null;
  const lastMA20 = n >= 20 ? ma20[n-1] : null;
  let score = 0, maxScore = 0;
  const add = cond => { maxScore++; if (cond) score++; };
  if (lastMA5  !== null) add(lastPrice > lastMA5);
  if (lastMA10 !== null) add(lastPrice > lastMA10);
  if (lastMA20 !== null) add(lastPrice > lastMA20);
  if (lastMA5  !== null && lastMA10 !== null) add(lastMA5  > lastMA10);
  if (lastMA10 !== null && lastMA20 !== null) add(lastMA10 > lastMA20);
  if (lastMA5  !== null && lastMA20 !== null) add(lastMA5  > lastMA20);
  if (maxScore === 0) return { signal:'データ不足', cls:'no-data', score:0, maxScore:0, dataPoints:n, lastMA5, lastMA10, lastMA20 };
  const ratio = score / maxScore;
  let signal, cls;
  if      (ratio >= 5/6) { signal='強い買い'; cls='strong-buy'; }
  else if (ratio >= 4/6) { signal='買い';     cls='buy'; }
  else if (ratio >= 2/6) { signal='中立';     cls='neutral'; }
  else if (ratio >= 1/6) { signal='売り';     cls='sell'; }
  else                   { signal='強い売り'; cls='strong-sell'; }
  const partial = maxScore < 6 ? '（参考）' : '';
  return { signal:signal+partial, cls, score, maxScore, dataPoints:n, lastMA5, lastMA10, lastMA20 };
}

// ===== TABLE DATA =====
function buildDodMap() {
  // collected_date(収集日)ではなく DATE(transaction_date)(実取引日)で日別平均を比較する
  // → collected_dateが1日分しかなくても実取引が複数日にまたがっていれば前日比を計算できる
  const rows = q(`SELECT apparel_id, DATE(transaction_date) as tx_day, CAST(AVG(price) AS INT) as da
    FROM ranking_transactions GROUP BY apparel_id, DATE(transaction_date) ORDER BY apparel_id, tx_day DESC`);
  const map = {};
  rows.forEach(r => {
    if (!map[r.apparel_id]) map[r.apparel_id] = [];
    if (map[r.apparel_id].length < 2) map[r.apparel_id].push(r.da);
  });
  return map;
}

function buildTrendMap() {
  const allTx = q(`SELECT apparel_id, price FROM ranking_transactions ORDER BY apparel_id, transaction_date ASC`);
  const pm = {};
  allTx.forEach(r => { if (!pm[r.apparel_id]) pm[r.apparel_id]=[]; pm[r.apparel_id].push(r.price); });
  const result = {};
  Object.entries(pm).forEach(([apId, prices]) => {
    result[apId] = getTrendSignal(prices, calcMA(prices,5), calcMA(prices,10), calcMA(prices,20));
  });
  return result;
}

function buildTable() {
  const dodMap   = buildDodMap();
  const trendMap = buildTrendMap();
  const rows = q(`SELECT apparel_id, card_name, rarity, set_name, collection_no, url,
    MIN(rank) as rank, COUNT(*) as cnt, MAX(price) as mx, MIN(price) as mn,
    CAST(AVG(price) AS INT) as avg
    FROM ranking_transactions GROUP BY apparel_id`);

  // has_more: DBの has_more 列は過去の誤ったデータが残っているため使わない
  // 最新収集日の実際の件数をカウントし、24件以上なら has_more=1 と判定する
  const latestCntRows = q(`
    SELECT t.apparel_id, COUNT(*) as latest_cnt
    FROM ranking_transactions t
    INNER JOIN (
      SELECT apparel_id, MAX(collected_date) as max_date
      FROM ranking_transactions GROUP BY apparel_id
    ) latest ON t.apparel_id = latest.apparel_id AND t.collected_date = latest.max_date
    GROUP BY t.apparel_id`);
  const latestCntMap = {};
  latestCntRows.forEach(r => { latestCntMap[r.apparel_id] = r.latest_cnt; });

  tableData = rows.map(r => {
    const dod = dodMap[r.apparel_id];
    const dod_pct = (dod && dod.length >= 2) ? (dod[0]-dod[1])/dod[1]*100 : null;
    const snkr = r.avg > 0 ? Math.floor((r.avg*0.907-240)/1.10) : null;
    const mcr  = r.avg > 0 ? Math.floor((r.avg*0.900-160)/1.10) : null;
    const trend = trendMap[r.apparel_id] || { cls:'no-data', score:0, maxScore:0, dataPoints:0 };
    // 最新収集日の件数が24件以上のときのみ + 表示
    const has_more = (latestCntMap[r.apparel_id] || 0) >= 24 ? 1 : 0;
    return { ...r, has_more, dod:dod_pct, snkr:snkr>0?snkr:null, mcr:mcr>0?mcr:null,
             trend, trendScore: TREND_SCORE_MAP[trend.cls] ?? 0 };
  });
  renderTableBody();
}

function getFilteredSorted() {
  const filtered = tableData.filter(r => {
    const txt = filterText.trim().toLowerCase();
    if (txt) {
      const h = ((r.card_name||'')+' '+(r.set_name||'')+' '+(r.collection_no||'')+' '+(r.rarity||'')).toLowerCase();
      if (!h.includes(txt)) return false;
    }
    if (filterRarity !== 'all' && r.rarity !== filterRarity) return false;
    if (filterSet !== 'all' && !getPokemonNames(r).includes(filterSet)) return false;
    return true;
  });
  return [...filtered].sort((a,b) => {
    const va = a[sortCol], vb = b[sortCol];
    if (sortCol === 'rank') {
      if (!va && !vb) return 0; if (!va) return 1; if (!vb) return -1;
      return sortDir === -1 ? va-vb : vb-va;
    }
    if (va === null && vb === null) return 0;
    if (va === null) return 1; if (vb === null) return -1;
    return sortDir * (vb - va);
  });
}

// ===== RENDER TABLE / CARDS =====
function renderTableBody() {
  const sorted = getFilteredSorted();
  document.getElementById('resultCount').textContent =
    sorted.length < tableData.length ? `${sorted.length} / ${tableData.length} 件` : `全 ${tableData.length} 件`;
  const empty = document.getElementById('emptyState');
  if (!sorted.length) {
    document.getElementById('tableBody').innerHTML = '';
    empty.style.display = 'block'; return;
  }
  empty.style.display = 'none';
  document.getElementById('tableBody').innerHTML = isMobile()
    ? renderCards(sorted)
    : renderRows(sorted);
}

function renderRows(sorted) {

      : '<span class="chg flat">—</span>';
    const trendLabel = TREND_LABEL_MAP[r.trend.cls] || '—';
    const scoreInfo  = r.trend.maxScore > 0 ? ` title="${r.trend.score}/${r.trend.maxScore}点 (${r.trend.dataPoints}件)"` : '';

      <td><a class="card-link" href="${r.url||'#'}" target="_blank" onclick="event.stopPropagation()">${fullName}</a>${meta?`<div class="card-meta">${meta}</div>`:''}</td>
      <td style="text-align:center">${rarityBadge(r.rarity)}</td>
      <td style="color:var(--text3);font-size:11px">${r.rank?'#'+r.rank:'—'}</td>
      <td style="color:var(--blue)">${r.cnt}${r.has_more?'<sup style="color:var(--accent);font-size:9px;margin-left:1px">+</sup>':''}</td>
      <td style="color:var(--red)">${fmt(r.mx)}</td>
      <td style="color:var(--green)">${fmt(r.mn)}</td>
      <td class="price-avg">${fmt(r.avg)}</td>
      <td>${dodHtml}</td>
      <td style="text-align:center">${trendHtml}</td>
      <td class="buy-price hide-mobile">${r.snkr?fmt(r.snkr):'<span style="color:var(--text3)">—</span>'}</td>
      <td class="buy-price hide-mobile">${r.mcr ?fmt(r.mcr) :'<span style="color:var(--text3)">—</span>'}</td>
    </tr>`;
  }).join('');
}

/* ----- モバイル: コンパクトカード (3行レイアウト) ----- */
function renderCards(sorted) {
  return sorted.map(r => {
    const fullName = (r.card_name || '—') + (r.rarity ? ' ' + r.rarity : '') + (r.collection_no ? ' [' + r.collection_no + ']' : '');
    const dodHtml = r.dod !== null
      ? `<span class="chg ${r.dod>=0?'up':'down'}">${r.dod>=0?'+':'▼'}${Math.abs(r.dod).toFixed(1)}%</span>`
      : '<span class="chg flat">—</span>';
    const trendLabel = TREND_LABEL_MAP[r.trend.cls] || '—';
    const isActive   = r.apparel_id == activeApId;
    const buyParts   = [];
    if (r.snkr) buyParts.push('SNKR ' + fmtShort(r.snkr));
    if (r.mcr)  buyParts.push('M ' + fmtShort(r.mcr));
    const rankStr = r.rank ? '#' + r.rank + ' &middot; ' : '';
    return `<tr class="card-row${isActive?' active':''}" onclick="selectCard('${escJs(r.apparel_id)}',this)" data-apid="${r.apparel_id}">
      <td>
        <div class="mc-card">
          <!-- 行1: カード名（レア+No.含む） | トレンド判定 -->
          <div class="mc-row1">
            <div class="mc-name-area">
              <a class="mc-name" href="${r.url||'#'}" target="_blank" onclick="event.stopPropagation()">${fullName}</a>
            </div>
            <span class="signal-badge sig-${r.trend.cls} mc-trend">${trendLabel}</span>
          </div>
          <!-- 行2: 平均価格(大) | ランク・件数・前日比 -->
          <div class="mc-row2">
            <span class="mc-avg">${fmt(r.avg)}</span>
            <span class="mc-meta">${rankStr}${r.cnt}${r.has_more?'+':''}件 &middot; ${dodHtml}</span>
          </div>
          <!-- 行3: 高値・安値 | 仕入上限 -->
          <div class="mc-row3">
            <span class="mc-hilow">高 ${fmtShort(r.mx)}&ensp;低 ${fmtShort(r.mn)}</span>
            ${buyParts.length ? `<span class="mc-buy">${buyParts.join(' / ')}</span>` : ''}
          </div>
        </div>
      </td>
    </tr>`;
  }).join('');
}

// ===== SORT =====
function setSort(col) {
  sortDir = (sortCol === col) ? -sortDir : (col === 'rank' ? 1 : -1);
  sortCol = col;
  ['rank','cnt','mx','mn','avg','dod','trendScore'].forEach(c => {
    const th = document.getElementById('th-'+c);
    const si = document.getElementById('si-'+c);
    if (th) th.classList.toggle('sort-active', c === col);
    if (si) si.textContent = c === col ? (sortDir === -1 ? '↓' : '↑') : '';
  });
  // モバイルソートセレクトも同期
  const mss = document.getElementById('mobileSortSelect');
  if (mss) mss.value = col;
  const msb = document.getElementById('mobileSortDirBtn');
  if (msb) msb.textContent = sortDir === -1 ? '↓ 降順' : '↑ 昇順';
  renderTableBody();
}

function onMobileSortChange() {
  const col = document.getElementById('mobileSortSelect').value;
  sortDir = col === 'rank' ? 1 : -1;
  sortCol = col;
  document.getElementById('mobileSortDirBtn').textContent = sortDir === -1 ? '↓ 降順' : '↑ 昇順';
  renderTableBody();
}

function toggleMobileSortDir() {
  sortDir = -sortDir;
  document.getElementById('mobileSortDirBtn').textContent = sortDir === -1 ? '↓ 降順' : '↑ 昇順';
  renderTableBody();
}

// ===== RARITY CHIPS =====
function buildRarityChips() {
  const rarities = [...new Set(tableData.map(r => r.rarity).filter(Boolean))].sort();
  const container = document.getElementById('rarityChips');
  container.innerHTML = '';
  ['all', ...rarities].forEach(r => {
    const btn = document.createElement('button');
    btn.className = 'chip' + (r === 'all' ? ' active' : '');
    btn.textContent = r === 'all' ? 'ALL' : r;
    btn.dataset.rarity = r;
    btn.onclick = () => { filterRarity = r; document.querySelectorAll('.chip').forEach(c => c.classList.toggle('active', c.dataset.rarity === r)); renderTableBody(); };
    container.appendChild(btn);
  });
}

// ===== POKEMON NAME FILTER =====
function getPokemonNames(r) {
  // Excel B/C/D列の手動入力ポケモン名を優先、未登録はカード名から自動抽出
  const mapped = POKEMON_NAME_MAP[String(r.apparel_id)];
  if (mapped && mapped.length) return mapped;
  const m = (r.card_name || '').match(/^([぀-ヿ一-鿿]+(?:[&＆][぀-ヿ一-鿿]+)*)/);
  return m ? [m[1]] : [r.card_name];
}
function buildSetFilter() {
  const nameSet = new Set();
  tableData.forEach(r => getPokemonNames(r).forEach(n => nameSet.add(n)));
  const names = [...nameSet].sort();
  const sel = document.getElementById('setFilter');
  sel.innerHTML = `<option value="all">ポケモン: すべて</option>` +
    names.map(n => `<option value="${escJs(n)}">${n}</option>`).join('');
  sel.value = filterSet;
}
function onSetFilterChange() {
  filterSet = document.getElementById('setFilter').value;
  renderTableBody();
}

// ===== CHART SELECT =====
function buildCardSelect() {
  const cards = q(`SELECT apparel_id, card_name, set_name, collection_no, MIN(rank) as rank
    FROM ranking_transactions GROUP BY apparel_id ORDER BY MIN(rank)`);
  allOptions = cards.map(c => {
    const meta = [c.set_name, c.collection_no].filter(Boolean).join(' · ');
    return { value: String(c.apparel_id), text: `#${c.rank||'?'} ${c.card_name}${meta ? '  ['+meta+']' : ''}`, cardName: c.card_name||'' };
  });
  populateSelect(allOptions);
}
function populateSelect(opts) {
  document.getElementById('cardSelect').innerHTML = opts.map(o => `<option value="${escJs(o.value)}">${o.text}</option>`).join('');
}
function filterChartSelect(txt) {
  const lower = txt.toLowerCase().trim();
  const filtered = lower ? allOptions.filter(o => o.text.toLowerCase().includes(lower)) : allOptions;
  populateSelect(filtered);
  if (filtered.length) { document.getElementById('cardSelect').value = filtered[0].value; renderChart(); }
}
function onSelectChange() { renderChart(); }

function selectCard(apId, rowEl) {
  activeApId = String(apId);
  document.querySelectorAll('#tableBody tr').forEach(tr => tr.classList.remove('active'));
  rowEl.classList.add('active');
  populateSelect(allOptions);
  document.getElementById('chartSearchInput').value = '';
  document.getElementById('cardSelect').value = activeApId;
  // モバイルではチャートパネルを展開
  if (isMobile() && !chartPanelOpen) {
    chartPanelOpen = true;
    document.getElementById('chartPanelBody').classList.remove('chart-collapsed');
    document.getElementById('chartToggleBtn').textContent = '▲ 閉じる';
  }
  renderChart();
  document.getElementById('chartPanel').scrollIntoView({ behavior:'smooth', block:'start' });
}

function toggleLabels() { showPriceLabels = !showPriceLabels; renderChart(); }

function toggleChartPanel() {
  chartPanelOpen = !chartPanelOpen;
  const body = document.getElementById('chartPanelBody');
  const btn  = document.getElementById('chartToggleBtn');
  body.classList.toggle('chart-collapsed', !chartPanelOpen);
  btn.textContent = chartPanelOpen ? '▲ 閉じる' : '▼ チャートを開く';
  if (chartPanelOpen) renderChart();
}

// ===== CHART =====
function renderChart() {
  const apId = document.getElementById('cardSelect').value;
  if (!apId) return;
  // グラフは最新取引から最大7日（168時間）分を表示
  const maxDateRes = q('SELECT MAX(transaction_date) as d FROM ranking_transactions WHERE apparel_id=?', [apId]);
  const maxDate = maxDateRes.length ? maxDateRes[0].d : null;
  const rows = maxDate
    ? q('SELECT transaction_date, price FROM ranking_transactions WHERE apparel_id=? AND transaction_date >= datetime(?,\'-168 hours\') ORDER BY transaction_date', [apId, maxDate])
    : [];
  const stats  = q('SELECT MIN(price) as mn, MAX(price) as mx, CAST(AVG(price) AS INT) as avg, COUNT(*) as cnt FROM ranking_transactions WHERE apparel_id=?', [apId])[0];
  const ch24   = getTimeWindowChange(apId, 24);
  const ch48   = getTimeWindowChange(apId, 48);
  const opt    = allOptions.find(o => o.value === String(apId));
  document.getElementById('chartCardName').textContent = opt ? opt.cardName : '';
  const labels = rows.map(r => (r.transaction_date||'').replace('T',' ').substring(5,16));
  const prices = rows.map(r => r.price);
  const ma5    = calcMA(prices, 5);
  const ma10   = calcMA(prices, 10);
  const ma20   = calcMA(prices, 20);
  const trend  = getTrendSignal(prices, ma5, ma10, ma20);
  updateStats(stats, ch24, ch48, trend);
  if (chartInst) chartInst.destroy();
  if (!prices.length) return;
  const ptRadius = prices.length <= 40 ? 5 : prices.length <= 100 ? 3 : 2;
  chartInst = new Chart(document.getElementById('priceChart'), {
    data: {
      labels,
      datasets: [
        { type:'line', label:'取引価格', data:prices,
          borderColor:'#e8a020', backgroundColor:'rgba(232,160,32,0.06)', borderWidth:2,
          pointRadius:ptRadius, pointBackgroundColor:'#e8a020', pointBorderColor:'#0f0f0f', pointBorderWidth:2,
          tension:0.2, fill:true, order:4,
          datalabels:{ display: showPriceLabels ? 'auto' : false, color:'#e8a020',
            backgroundColor:'rgba(15,15,15,0.82)', borderRadius:3, padding:{top:2,bottom:2,left:4,right:4},
            font:{ size: prices.length > 60 ? 8 : 9, weight:'bold' },
            formatter: v => (v != null) ? '¥'+parseInt(v).toLocaleString() : null,
            anchor:'end', align:'top', offset:3, clamp:true } },
        { type:'line', label:'MA5',  data:ma5,  borderColor:'#4caf7d', borderWidth:1.5, borderDash:[5,3], pointRadius:0, tension:0.3, fill:false, spanGaps:false, order:3, datalabels:{display:false} },
        { type:'line', label:'MA10', data:ma10, borderColor:'#5b9cf6', borderWidth:1.5, borderDash:[5,3], pointRadius:0, tension:0.3, fill:false, spanGaps:false, order:2, datalabels:{display:false} },
        { type:'line', label:'MA20', data:ma20, borderColor:'#e05555', borderWidth:1.5, borderDash:[5,3], pointRadius:0, tension:0.3, fill:false, spanGaps:false, order:1, datalabels:{display:false} }
      ]
    },
    options: {
      responsive:true, maintainAspectRatio:false, interaction:{ mode:'index', intersect:false },
      layout:{ padding:{ top:28 } },
      plugins: {
        legend:{ display:false },
        tooltip:{ callbacks:{ label: ctx => ctx.raw === null ? null : ctx.dataset.label+': ¥'+parseInt(ctx.raw).toLocaleString() } },
        datalabels:{ display:false }
      },
      scales: {
        x:{ ticks:{ color:'#666', font:{size:11}, maxTicksLimit:10, maxRotation:30 }, grid:{ color:'rgba(255,255,255,0.05)' } },
        y:{ grace:'15%', ticks:{ color:'#666', font:{size:11}, callback: v => v>=10000 ? '¥'+(v/10000).toFixed(0)+'万' : '¥'+v.toLocaleString() }, grid:{ color:'rgba(255,255,255,0.05)' } }
      }
    }
  });
  document.getElementById('chartLegend').innerHTML = `
    <div class="legend-item"><div style="width:20px;height:2px;background:#e8a020;border-radius:2px"></div>取引価格</div>
    <div class="legend-item" style="color:#4caf7d"><div style="width:20px;border-top:2px dashed #4caf7d"></div>MA5${trend.lastMA5 ? '  '+fmt(trend.lastMA5) : '  —'}</div>
    <div class="legend-item" style="color:#5b9cf6"><div style="width:20px;border-top:2px dashed #5b9cf6"></div>MA10${trend.lastMA10 ? '  '+fmt(trend.lastMA10) : '  —'}</div>
    <div class="legend-item" style="color:#e05555"><div style="width:20px;border-top:2px dashed #e05555"></div>MA20${trend.lastMA20 ? '  '+fmt(trend.lastMA20) : '  —'}</div>`;
}

// ===== STATS =====
function updateStats(stats, ch24, ch48, trend) {
  document.getElementById('statsRow1').innerHTML = stats ? `
    <div class="stat-box"><div class="stat-box-label">高値</div><div class="stat-box-val" style="color:var(--red)">${fmt(stats.mx)}</div></div>
    <div class="stat-box"><div class="stat-box-label">安値</div><div class="stat-box-val" style="color:var(--green)">${fmt(stats.mn)}</div></div>
    <div class="stat-box"><div class="stat-box-label">平均</div><div class="stat-box-val">${fmt(stats.avg)}</div></div>
    <div class="stat-box"><div class="stat-box-label">件数</div><div class="stat-box-val" style="color:var(--text2)">${stats.cnt||0}件</div></div>` : '';
  document.getElementById('statsRow2').innerHTML = fmtChangeBox(ch24,'24h変化') + fmtChangeBox(ch48,'48h変化');
  const needMore = trend.dataPoints < 20 ? `<span style="font-size:10px;color:var(--text3)">(${trend.dataPoints}件/20件)</span>` : '';
  const scoreStr = trend.maxScore > 0 ? `${trend.score}/${trend.maxScore}` : '';
  document.getElementById('signalRow').innerHTML = `
    <span class="signal-label-text">トレンド判定:</span>
    <span class="signal-badge sig-${trend.cls}">${trend.signal}</span>
    ${scoreStr ? `<span class="signal-score">(${scoreStr})</span>` : ''}
    ${needMore}
    <button class="label-toggle-btn${showPriceLabels?' active':''}" onclick="toggleLabels()">💰 金額ラベル</button>`;
}

function fmtChangeBox(ch, label) {
  if (!ch || ch.count === 0)
    return `<div class="stat-box"><div class="stat-box-label">${label}</div><div class="stat-box-val" style="color:var(--text3)">取引なし</div></div>`;
  if (ch.diff === null)
    return `<div class="stat-box"><div class="stat-box-label">${label}</div><div class="stat-box-val" style="color:var(--text2)">${fmt(ch.price)}</div><div class="stat-box-sub">1件のみ</div></div>`;
  const isUp = ch.diff >= 0, clr = isUp ? 'var(--green)' : 'var(--red)', arr = isUp ? '+' : '▼';
  return `<div class="stat-box">
    <div class="stat-box-label">${label} (${ch.count}件)</div>
    <div class="stat-box-val" style="color:${clr}">${arr}${Math.abs(ch.pct).toFixed(1)}%</div>
    <div class="stat-box-sub">${fmtDiff(ch.diff)}　${fmt(ch.oldest)}→${fmt(ch.newest)}</div>
  </div>`;
}

// ===== EVENTS =====
document.getElementById('tableSearch').addEventListener('input', function() { filterText = this.value; renderTableBody(); });
document.getElementById('chartSearchInput').addEventListener('input', function() { filterChartSelect(this.value); });
window.addEventListener('scroll', () => { document.getElementById('scrollTopBtn').classList.toggle('show', window.scrollY > 300); });

// リサイズ時にテーブル/カードを切替
window.addEventListener('resize', () => {
  const nowMobile = isMobile();
  const wasMobile = lastWidth < 768;
  lastWidth = window.innerWidth;
  if (nowMobile !== wasMobile && document.getElementById('mainView').style.display !== 'none') {
    renderTableBody();
  }
});

loadData();
</script>
